<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MACH:INE II</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
    }

    canvas { display: block; }

    /* ── Start screen ── */
    #start {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000;
      cursor: pointer;
      z-index: 10;
    }
    #start h1 {
      font-size: clamp(28px, 6vw, 64px);
      font-weight: 100;
      letter-spacing: 0.35em;
      color: #fff;
      margin-bottom: 48px;
    }
    #start p {
      font-size: 10px;
      letter-spacing: 0.4em;
      color: rgba(255,255,255,0.25);
      transition: color 0.3s;
    }
    #start:hover p { color: rgba(255,255,255,0.7); }

    /* ── Debug HUD ── */
    #hud-debug {
      display: none;
      position: fixed;
      bottom: 16px; left: 16px;
      color: rgba(255,255,255,0.25);
      font-size: 9px;
      letter-spacing: 0.15em;
      pointer-events: none;
      line-height: 1.6;
      white-space: pre;
      font-family: 'Courier New', Courier, monospace;
    }

    /* ── Error screen ── */
    #error {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center; justify-content: center;
      background: #000;
      color: rgba(255,80,80,0.8);
      font-size: 11px;
      letter-spacing: 0.3em;
      z-index: 20;
      text-align: center;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div id="start">
  <h1>MACH:INE II</h1>
  <p>CLICK TO BEGIN</p>
</div>

<div id="hud-debug"></div>

<div id="error">
  ACCESSO AL MICROFONO NEGATO<br><br>
  <span style="opacity:0.5;font-size:9px">ABILITA IL MICROFONO NEL BROWSER E RIPROVA</span>
</div>

<script type="module" src="src/main.js"></script>
</body>
</html>
