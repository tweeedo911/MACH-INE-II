<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MACH:INE II — Sandbox v0.4.0</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #aaa;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      overflow: hidden;
      display: flex;
      height: 100vh;
    }

    /* ── Canvas area ── */
    #canvas-wrap {
      flex: 7;
      position: relative;
    }
    canvas { display: block; width: 100%; height: 100%; }

    /* ── Control panel ── */
    #panel {
      flex: 3;
      min-width: 280px;
      max-width: 360px;
      background: #0a0a0a;
      border-left: 1px solid #1c1c1c;
      padding: 16px;
      overflow-y: auto;
      user-select: none;
    }

    .section-title {
      color: #636363;
      letter-spacing: 0.3em;
      font-size: 10px;
      margin: 20px 0 10px;
      border-bottom: 1px solid #1c1c1c;
      padding-bottom: 4px;
    }
    .section-title:first-child { margin-top: 0; }

    /* ── Sliders ── */
    .slider-row {
      display: flex;
      align-items: center;
      margin: 7px 0;
      gap: 8px;
    }
    .slider-row label {
      width: 40px;
      color: #828282;
      font-size: 10px;
      letter-spacing: 0.15em;
      flex-shrink: 0;
    }
    .slider-row input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      background: #2e2e2e;
      outline: none;
    }
    .slider-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      background: #a8a8a8;
      border-radius: 0;
      cursor: pointer;
    }
    .slider-row .val {
      width: 36px;
      text-align: right;
      color: #828282;
      font-size: 10px;
    }

    /* ── Trajectory buttons ── */
    .traj-row {
      display: flex;
      align-items: center;
      margin: 7px 0;
      gap: 8px;
    }
    .traj-row label {
      width: 40px;
      color: #828282;
      font-size: 10px;
      letter-spacing: 0.15em;
      flex-shrink: 0;
    }
    .traj-btn {
      flex: 1;
      background: #1c1c1c;
      color: #636363;
      border: 1px solid #2e2e2e;
      font-family: inherit;
      font-size: 12px;
      padding: 5px 0;
      cursor: pointer;
      text-align: center;
    }
    .traj-btn.active {
      background: #2e2e2e;
      color: #e8e8e8;
      border-color: #636363;
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 6px;
      margin: 8px 0;
    }
    .btn {
      flex: 1;
      background: #1c1c1c;
      color: #828282;
      border: 1px solid #2e2e2e;
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 0.15em;
      padding: 7px 0;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, color 0.15s;
    }
    .btn:hover { background: #2e2e2e; color: #e8e8e8; }
    .btn.onset { border-color: #FF4400; color: #FF4400; }
    .btn.onset:hover { background: #FF4400; color: #000; }
    .btn.midi-note { border-color: #00AACC; color: #00AACC; }
    .btn.midi-note:hover { background: #00AACC; color: #000; }

    /* ── Toggle ── */
    .toggle-row {
      display: flex;
      align-items: center;
      margin: 7px 0;
      gap: 8px;
    }
    .toggle-row label {
      width: 40px;
      color: #828282;
      font-size: 10px;
      letter-spacing: 0.15em;
      flex-shrink: 0;
    }
    .toggle-btn {
      background: #1c1c1c;
      color: #474747;
      border: 1px solid #2e2e2e;
      font-family: inherit;
      font-size: 10px;
      padding: 4px 12px;
      cursor: pointer;
    }
    .toggle-btn.on {
      background: #2e2e2e;
      color: #e8e8e8;
      border-color: #636363;
    }

    /* ── Presets ── */
    .preset-row { display: flex; gap: 4px; margin: 8px 0; }
    .preset {
      flex: 1;
      background: #0d0d0d;
      color: #636363;
      border: 1px solid #1c1c1c;
      font-family: inherit;
      font-size: 9px;
      letter-spacing: 0.2em;
      padding: 6px 0;
      cursor: pointer;
      text-align: center;
    }
    .preset:hover { color: #a8a8a8; border-color: #474747; }

    /* ── Readout ── */
    #readout {
      font-size: 10px;
      line-height: 1.7;
      color: #636363;
      white-space: pre;
      margin-top: 8px;
    }
    #readout .val-highlight { color: #a8a8a8; }

    .hint {
      color: #474747;
      font-size: 9px;
      margin-top: 4px;
      letter-spacing: 0.1em;
    }

    .btn.auto-btn { border-color: #636363; }
    .btn.auto-btn.running { border-color: #a8a8a8; color: #e8e8e8; background: #2e2e2e; }
  </style>
</head>
<body>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
</div>

<div id="panel">
  <div class="section-title">SIMULAZIONE INPUT</div>

  <div class="slider-row">
    <label>INT</label>
    <input type="range" id="sl-int" min="0" max="1" step="0.01" value="0">
    <span class="val" id="v-int">0.00</span>
  </div>
  <div class="slider-row">
    <label>RHYT</label>
    <input type="range" id="sl-rhyt" min="0" max="1" step="0.01" value="0">
    <span class="val" id="v-rhyt">0.00</span>
  </div>
  <div class="slider-row">
    <label>BRIT</label>
    <input type="range" id="sl-brit" min="0" max="1" step="0.01" value="0.5">
    <span class="val" id="v-brit">0.50</span>
  </div>

  <div class="traj-row">
    <label>TRAJ</label>
    <button class="traj-btn" data-val="-1">&#9660;</button>
    <button class="traj-btn active" data-val="0">&#9644;</button>
    <button class="traj-btn" data-val="1">&#9650;</button>
  </div>

  <div class="slider-row">
    <label>WIDE</label>
    <input type="range" id="sl-wide" min="0" max="1" step="0.01" value="0.5">
    <span class="val" id="v-wide">0.50</span>
  </div>

  <div class="btn-row">
    <button class="btn onset" id="btn-onset">ONSET</button>
    <button class="btn midi-note" id="btn-midi">MIDI NOTE</button>
  </div>
  <div class="hint">SPAZIO = onset &nbsp; M = midi note</div>

  <div class="preset-row">
    <button class="preset" data-preset="silence">SILENCE</button>
    <button class="preset" data-preset="ambient">AMBIENT</button>
    <button class="preset" data-preset="building">BUILDING</button>
    <button class="preset" data-preset="peak">PEAK</button>
  </div>

  <div class="btn-row">
    <button class="btn auto-btn" id="btn-auto">AUTO</button>
  </div>

  <div class="section-title">CAMPO</div>

  <div class="slider-row">
    <label>DOT</label>
    <input type="range" id="sl-dot" min="1" max="16" step="1" value="1">
    <span class="val" id="v-dot">auto</span>
  </div>

  <div class="toggle-row">
    <label>INV</label>
    <button class="toggle-btn" id="btn-invert">OFF</button>
  </div>

  <div class="section-title">REGISTA</div>
  <div id="readout"></div>

  <div class="slider-row">
    <label>BASE</label>
    <input type="range" id="sl-base" min="10" max="60" step="1" value="30">
    <span class="val" id="v-base">30s</span>
  </div>
  <div class="slider-row">
    <label>DIV</label>
    <input type="range" id="sl-div" min="0" max="3" step="1" value="1">
    <span class="val" id="v-div">8</span>
  </div>
  <div class="slider-row">
    <label>RND</label>
    <input type="range" id="sl-rnd" min="0" max="1" step="0.01" value="0.3">
    <span class="val" id="v-rnd">0.30</span>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  MACH:INE II — Sandbox v0.4.0: Campo Halftone
// ═══════════════════════════════════════════════════════════

// ── CONFIG ──
const CFG = {
  // Dot-size range (driven by brightness)
  dotSizeMin: 1,            // at brightness 1.0
  dotSizeMax: 16,           // at brightness 0.0

  // Density field
  densityBase: 0.02,        // base density at intensity 0
  densityMax: 0.4,          // base density at intensity 1
  densityBandHigh: 0.85,    // density inside BANDA
  densityBandLow: 0.05,     // density outside BANDA

  // BANDA primitive
  bandaCount: 2,
  bandaWidthMin: 0.02,      // fraction of screen
  bandaWidthMax: 0.12,
  bandaSpeedMin: 0.05,      // speed at rhythmicity 0
  bandaSpeedMax: 0.6,       // speed at rhythmicity 1
  bandaPulseAmp: 0.04,      // width pulsing with intensity

  // BLOCCO primitive
  bloccoCount: 3,
  bloccoSizeMin: 0.04,
  bloccoSizeMax: 0.18,
  bloccoLifeMinSlow: 6,     // life at rhythmicity 0
  bloccoLifeMinFast: 1,     // life at rhythmicity 1
  bloccoLifeMaxSlow: 12,
  bloccoLifeMaxFast: 3,
  bloccoDotSizeSmall: 0.3,  // multiplier (smaller dots)
  bloccoDotSizeLarge: 2.5,  // multiplier (larger dots)

  // Stereo width
  widthCenterFalloff: 3.0,  // exponent for center concentration

  // Onset wave
  onsetWaveSpeed: 800,      // px/sec
  onsetWaveDensity: 0.9,
  onsetWaveWidth: 60,       // px width of ring
  onsetDecayRate: 0.92,

  // MIDI column
  midiColumnWidth: 0.03,    // fraction of screen width
  midiColumnDecay: 0.93,

  // Climax
  climaxThresholdSec: 3,
  climaxIntensityThreshold: 0.85,
  climaxPulseSpeed: 0.03,

  // Framing
  framingLerpSpeed: 0.02,
  framingMacroZoom: 3,
  framingMediumZoom: 1.5,
  framingPanSpeed: 0.3,

  // Director
  directorBPM: 120,
  directorPlateauSec: 5,
  directorChangeThreshold: 0.6,

  // Brightness: density boost (brighter sound = more visible field)
  brightnessDensityBoost: 0.15, // added to density at brightness 1

  // Rhythmicity: field flicker
  rhythmFlickerAmp: 0.12,   // density oscillation amplitude at rhythmicity 1
  rhythmFlickerSpeed: 8,    // oscillation Hz

  // Render strategy
  dotSizeBufferThreshold: 6, // below this use buffer+scale
};

// ═══════════════════════════════════════
//  Bayer 8x8 matrix (normalized 0-1)
// ═══════════════════════════════════════

const BAYER8 = new Float32Array([
   0/64, 32/64,  8/64, 40/64,  2/64, 34/64, 10/64, 42/64,
  48/64, 16/64, 56/64, 24/64, 50/64, 18/64, 58/64, 26/64,
  12/64, 44/64,  4/64, 36/64, 14/64, 46/64,  6/64, 38/64,
  60/64, 28/64, 52/64, 20/64, 62/64, 30/64, 54/64, 22/64,
   3/64, 35/64, 11/64, 43/64,  1/64, 33/64,  9/64, 41/64,
  51/64, 19/64, 59/64, 27/64, 49/64, 17/64, 57/64, 25/64,
  15/64, 47/64,  7/64, 39/64, 13/64, 45/64,  5/64, 37/64,
  63/64, 31/64, 55/64, 23/64, 61/64, 29/64, 53/64, 21/64,
]);

// ═══════════════════════════════════════
//  Canvas setup
// ═══════════════════════════════════════

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  const wrap = document.getElementById('canvas-wrap');
  W = canvas.width = wrap.clientWidth;
  H = canvas.height = wrap.clientHeight;
}
window.addEventListener('resize', resize);
resize();

// ═══════════════════════════════════════
//  State
// ═══════════════════════════════════════

const state = {
  intensity: 0,
  rhythmicity: 0,
  brightness: 0.5,
  trajectory: 0,
  stereoWidth: 0.5,
};

let inverted = false;
let dotSizeOverride = 0; // 0 = auto
let globalTime = 0;      // seconds, for rhythmic flicker

// ═══════════════════════════════════════
//  BANDA primitives
// ═══════════════════════════════════════

let bandas = [];

function initBandas() {
  bandas = [];
  for (let i = 0; i < CFG.bandaCount; i++) {
    bandas.push({
      position: Math.random(),
      width: CFG.bandaWidthMin + Math.random() * (CFG.bandaWidthMax - CFG.bandaWidthMin),
      direction: (Math.random() > 0.5 ? 1 : -1) * (0.5 + Math.random() * 0.5),
      horizontal: Math.random() > 0.3,
    });
  }
}
initBandas();

function updateBandas(dt) {
  const speed = CFG.bandaSpeedMin + (CFG.bandaSpeedMax - CFG.bandaSpeedMin) * state.rhythmicity;
  for (const b of bandas) {
    b.position += b.direction * speed * dt;
    if (b.position > 1) { b.position = 1; b.direction *= -1; }
    if (b.position < 0) { b.position = 0; b.direction *= -1; }
  }
}

// ═══════════════════════════════════════
//  BLOCCO primitives
// ═══════════════════════════════════════

let bloccos = [];

function spawnBlocco() {
  return {
    x: 0.05 + Math.random() * 0.7,
    y: 0.05 + Math.random() * 0.7,
    w: CFG.bloccoSizeMin + Math.random() * (CFG.bloccoSizeMax - CFG.bloccoSizeMin),
    h: CFG.bloccoSizeMin + Math.random() * (CFG.bloccoSizeMax - CFG.bloccoSizeMin),
    dotSizeMul: Math.random() > 0.5 ? CFG.bloccoDotSizeSmall : CFG.bloccoDotSizeLarge,
    density: 0.5 + Math.random() * 0.5,
    life: (CFG.bloccoLifeMinSlow + (CFG.bloccoLifeMinFast - CFG.bloccoLifeMinSlow) * state.rhythmicity)
          + Math.random() * ((CFG.bloccoLifeMaxSlow + (CFG.bloccoLifeMaxFast - CFG.bloccoLifeMaxSlow) * state.rhythmicity)
          - (CFG.bloccoLifeMinSlow + (CFG.bloccoLifeMinFast - CFG.bloccoLifeMinSlow) * state.rhythmicity)),
    age: 0,
    alpha: 0,
  };
}

function initBloccos() {
  bloccos = [];
  for (let i = 0; i < CFG.bloccoCount; i++) {
    const b = spawnBlocco();
    b.age = Math.random() * b.life;
    bloccos.push(b);
  }
}
initBloccos();

function updateBloccos(dt) {
  for (let i = 0; i < bloccos.length; i++) {
    const b = bloccos[i];
    b.age += dt;
    const fadeIn = 0.5, fadeOut = 0.5;
    if (b.age < fadeIn) b.alpha = b.age / fadeIn;
    else if (b.age > b.life - fadeOut) b.alpha = Math.max(0, (b.life - b.age) / fadeOut);
    else b.alpha = 1;
    if (b.age >= b.life) bloccos[i] = spawnBlocco();
  }
}

// ═══════════════════════════════════════
//  Onset waves
// ═══════════════════════════════════════

let onsetWaves = [];

function triggerOnset() {
  onsetWaves.push({
    cx: W * (0.2 + Math.random() * 0.6),
    cy: H * (0.2 + Math.random() * 0.6),
    radius: 0,
    alpha: 1,
  });
}

function updateOnsets(dt) {
  for (let i = onsetWaves.length - 1; i >= 0; i--) {
    const w = onsetWaves[i];
    w.radius += CFG.onsetWaveSpeed * dt;
    w.alpha *= CFG.onsetDecayRate;
    if (w.alpha < 0.01) onsetWaves.splice(i, 1);
  }
}

// ═══════════════════════════════════════
//  MIDI columns
// ═══════════════════════════════════════

let midiColumns = [];

function triggerMIDI() {
  midiColumns.push({ x: Math.random(), alpha: 1 });
}

function updateMidi() {
  for (let i = midiColumns.length - 1; i >= 0; i--) {
    midiColumns[i].alpha *= CFG.midiColumnDecay;
    if (midiColumns[i].alpha < 0.01) midiColumns.splice(i, 1);
  }
}

// ═══════════════════════════════════════
//  Density field computation
// ═══════════════════════════════════════

function computeDensity(nx, ny, px, py) {
  // Base density from intensity
  let d = CFG.densityBase + (CFG.densityMax - CFG.densityBase) * state.intensity;

  // Stereo width: concentrate toward center when width is low
  if (state.stereoWidth < 1) {
    const centerDist = Math.abs(nx - 0.5) * 2;
    const falloff = Math.pow(centerDist, CFG.widthCenterFalloff * (1 - state.stereoWidth));
    d *= 1 - falloff * (1 - state.stereoWidth);
  }

  // BANDA contribution
  for (const b of bandas) {
    const coord = b.horizontal ? ny : nx;
    const halfW = (b.width + CFG.bandaPulseAmp * state.intensity) * 0.5;
    if (Math.abs(coord - b.position) < halfW) {
      d = Math.max(d, CFG.densityBandHigh * state.intensity);
    }
  }

  // Onset waves
  for (const w of onsetWaves) {
    const dx = px - w.cx;
    const dy = py - w.cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const ringDist = Math.abs(dist - w.radius);
    if (ringDist < CFG.onsetWaveWidth) {
      const waveDensity = (1 - ringDist / CFG.onsetWaveWidth) * CFG.onsetWaveDensity * w.alpha;
      d = Math.max(d, waveDensity);
    }
  }

  // MIDI columns
  for (const m of midiColumns) {
    const halfW = CFG.midiColumnWidth * 0.5;
    if (Math.abs(nx - m.x) < halfW) {
      d = Math.max(d, (1 - Math.abs(nx - m.x) / halfW) * m.alpha * 0.9);
    }
  }

  // Brightness: brighter sound = more visible field
  d += state.brightness * CFG.brightnessDensityBoost;

  // Rhythmicity: pulsating flicker
  if (state.rhythmicity > 0.01) {
    const flicker = Math.sin(globalTime * CFG.rhythmFlickerSpeed * Math.PI * 2)
                  * CFG.rhythmFlickerAmp * state.rhythmicity;
    d += flicker;
  }

  // Trajectory: vertical gradient
  if (state.trajectory === 1) d += (1 - ny) * 0.15 * state.intensity;
  else if (state.trajectory === -1) d += ny * 0.15 * state.intensity;

  return Math.min(1, Math.max(0, d));
}

// ═══════════════════════════════════════
//  Blocco: check if position is inside one
// ═══════════════════════════════════════

function getBloccoAt(nx, ny) {
  for (const b of bloccos) {
    if (b.alpha < 0.1) continue;
    if (nx >= b.x && nx <= b.x + b.w && ny >= b.y && ny <= b.y + b.h) return b;
  }
  return null;
}

// ═══════════════════════════════════════
//  Render: fillRect strategy (dot >= threshold)
// ═══════════════════════════════════════

function renderFieldFillRect(dotSize) {
  const cols = Math.ceil(W / dotSize);
  const rows = Math.ceil(H / dotSize);
  const fg = inverted ? '#000000' : '#FFFFFF';

  ctx.fillStyle = fg;

  for (let row = 0; row < rows; row++) {
    const py = row * dotSize;
    const ny = py / H;
    for (let col = 0; col < cols; col++) {
      const px = col * dotSize;
      const nx = px / W;

      const threshold = BAYER8[(row & 7) * 8 + (col & 7)];
      const density = computeDensity(nx, ny, px, py);

      if (density > threshold) {
        // Check blocco for different dot-size
        const blocco = getBloccoAt(nx, ny);
        if (blocco) {
          const localDot = Math.max(1, Math.min(16, Math.round(dotSize * blocco.dotSizeMul)));
          ctx.fillRect(px, py, localDot, localDot);
        } else {
          ctx.fillRect(px, py, dotSize, dotSize);
        }
      }
    }
  }
}

// ═══════════════════════════════════════
//  Render: buffer strategy (dot < threshold)
// ═══════════════════════════════════════

let bufferCanvas = null;
let bufferCtx = null;

function renderFieldBuffer(dotSize) {
  const bw = Math.ceil(W / dotSize);
  const bh = Math.ceil(H / dotSize);

  if (!bufferCanvas || bufferCanvas.width !== bw || bufferCanvas.height !== bh) {
    bufferCanvas = document.createElement('canvas');
    bufferCanvas.width = bw;
    bufferCanvas.height = bh;
    bufferCtx = bufferCanvas.getContext('2d');
  }

  const imgData = bufferCtx.createImageData(bw, bh);
  const data = imgData.data;
  const fg = inverted ? 0 : 255;

  for (let row = 0; row < bh; row++) {
    const ny = row / bh;
    const py = row * dotSize;
    for (let col = 0; col < bw; col++) {
      const nx = col / bw;
      const px = col * dotSize;

      const threshold = BAYER8[(row & 7) * 8 + (col & 7)];
      const density = computeDensity(nx, ny, px, py);

      const idx = (row * bw + col) * 4;
      if (density > threshold) {
        data[idx] = fg;
        data[idx + 1] = fg;
        data[idx + 2] = fg;
        data[idx + 3] = 255;
      }
      // else: stays 0,0,0,0 (transparent over black bg)
    }
  }

  bufferCtx.putImageData(imgData, 0, 0);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(bufferCanvas, 0, 0, W, H);
  ctx.imageSmoothingEnabled = true;
}

// ═══════════════════════════════════════
//  Climax
// ═══════════════════════════════════════

let climaxTimer = 0;
let inClimax = false;
let climaxPhase = 0;

function updateClimax(dt) {
  if (state.intensity > CFG.climaxIntensityThreshold) climaxTimer += dt;
  else { climaxTimer = 0; inClimax = false; }
  inClimax = climaxTimer >= CFG.climaxThresholdSec;
}

function drawClimax() {
  if (!inClimax) return;
  climaxPhase += CFG.climaxPulseSpeed;
  const pulse = 0.3 + Math.sin(climaxPhase) * 0.2;

  ctx.fillStyle = `rgba(230,0,126,${pulse * 0.2})`;
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2;
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 8; i++) {
    const t = (i / 8 + climaxPhase * 0.5) % 1;
    const s = t * Math.max(W, H) * 0.7;
    const a = (1 - t) * 0.6;
    ctx.strokeStyle = `rgba(230,0,126,${a})`;
    ctx.strokeRect(cx - s, cy - s * (H / W), s * 2, s * 2 * (H / W));
  }
}

// ═══════════════════════════════════════
//  Framing
// ═══════════════════════════════════════

const framing = {
  current: 'WIDE',
  targetZoom: 1, targetX: 0, targetY: 0,
  zoom: 1, offsetX: 0, offsetY: 0,
  panDirX: 0,
};

const FRAMING_TYPES = ['WIDE', 'MEDIUM', 'MACRO', 'PAN'];

function setFraming(type) {
  framing.current = type;
  switch (type) {
    case 'WIDE':
      framing.targetZoom = 1; framing.targetX = 0; framing.targetY = 0; framing.panDirX = 0;
      break;
    case 'MEDIUM':
      framing.targetZoom = CFG.framingMediumZoom;
      framing.targetX = 0; framing.targetY = 0; framing.panDirX = 0;
      break;
    case 'MACRO':
      framing.targetZoom = CFG.framingMacroZoom;
      framing.targetX = (Math.random() - 0.5) * W * 0.4;
      framing.targetY = (Math.random() - 0.5) * H * 0.4;
      framing.panDirX = 0;
      break;
    case 'PAN':
      framing.targetZoom = 1.2;
      framing.targetX = -W * 0.3; framing.targetY = 0;
      framing.panDirX = CFG.framingPanSpeed;
      break;
  }
}

function updateFraming() {
  const s = CFG.framingLerpSpeed;
  framing.zoom += (framing.targetZoom - framing.zoom) * s;
  framing.offsetX += (framing.targetX - framing.offsetX) * s;
  framing.offsetY += (framing.targetY - framing.offsetY) * s;
  if (framing.current === 'PAN') {
    framing.targetX += framing.panDirX;
    if (framing.targetX > W * 0.3 || framing.targetX < -W * 0.3) framing.panDirX *= -1;
  }
}

function applyFraming() {
  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.scale(framing.zoom, framing.zoom);
  ctx.translate(-W / 2 + framing.offsetX, -H / 2 + framing.offsetY);
}

function restoreFraming() { ctx.restore(); }

// ═══════════════════════════════════════
//  Director / Regista
// ═══════════════════════════════════════

const CHANGE_TYPES = ['TEXTURE', 'FRAMING', 'INVERT', 'RESET'];

const director = {
  scene: 'CAMPO_HALFTONE',
  sceneTime: 0, nextCheckIn: 0, changeProb: 0,
  lastChangeType: '——',
  plateauTime: 0,
};

let dirBaseInterval = 30;
let dirDivisorIdx = 1;
let dirRandomFactor = 0.3;
const DIVISORS = [4, 8, 16, 32];

function initDirector() {
  director.sceneTime = 0;
  computeNextCheck();
}

function computeNextCheck() {
  if (state.rhythmicity > 0.5) {
    const beatSec = 60 / CFG.directorBPM;
    director.nextCheckIn = DIVISORS[dirDivisorIdx] * beatSec * (0.8 + Math.random() * 0.4);
  } else {
    director.nextCheckIn = dirBaseInterval * (1 + dirRandomFactor * Math.random());
  }
}

function updateDirector(dt) {
  director.sceneTime += dt;
  director.nextCheckIn -= dt;
  if (state.trajectory === 0) director.plateauTime += dt;
  else director.plateauTime = 0;

  if (director.nextCheckIn <= 0) {
    let prob = 0.5;
    if (director.plateauTime > CFG.directorPlateauSec) prob += 0.3;
    prob += dirRandomFactor * Math.random();
    director.changeProb = Math.min(1, prob);
    if (prob > CFG.directorChangeThreshold) executeChange();
    computeNextCheck();
  }
}

function executeChange() {
  const type = CHANGE_TYPES[Math.floor(Math.random() * CHANGE_TYPES.length)];
  director.lastChangeType = type;
  director.sceneTime = 0;

  switch (type) {
    case 'TEXTURE':
      initBandas();
      initBloccos();
      break;
    case 'FRAMING':
      setFraming(FRAMING_TYPES[Math.floor(Math.random() * FRAMING_TYPES.length)]);
      break;
    case 'INVERT':
      inverted = !inverted;
      document.getElementById('btn-invert').textContent = inverted ? 'ON' : 'OFF';
      document.getElementById('btn-invert').classList.toggle('on', inverted);
      break;
    case 'RESET':
      initBandas();
      initBloccos();
      inverted = false;
      document.getElementById('btn-invert').textContent = 'OFF';
      document.getElementById('btn-invert').classList.remove('on');
      setFraming('WIDE');
      break;
  }
}

// ═══════════════════════════════════════
//  Auto mode
// ═══════════════════════════════════════

let autoMode = false;
let autoPhase = 0;
let autoTimer = 0;

const AUTO_PHASES = [
  { name: 'SILENCE',  dur: 4,  int: 0,    rhyt: 0,    brit: 0.3,  traj: 0,  wide: 0.2 },
  { name: 'AMBIENT',  dur: 8,  int: 0.15, rhyt: 0.05, brit: 0.35, traj: 0,  wide: 0.6 },
  { name: 'BUILDING', dur: 6,  int: 0.45, rhyt: 0.5,  brit: 0.5,  traj: 1,  wide: 0.4 },
  { name: 'PEAK',     dur: 5,  int: 0.85, rhyt: 0.8,  brit: 0.7,  traj: 0,  wide: 0.3 },
  { name: 'CLIMAX',   dur: 5,  int: 0.95, rhyt: 0.9,  brit: 0.85, traj: 0,  wide: 0.2 },
  { name: 'DECAY',    dur: 6,  int: 0.2,  rhyt: 0.1,  brit: 0.4,  traj: -1, wide: 0.5 },
];

function updateAuto(dt) {
  if (!autoMode) return;
  autoTimer += dt;
  const phase = AUTO_PHASES[autoPhase];
  if (autoTimer >= phase.dur) {
    autoTimer = 0;
    autoPhase = (autoPhase + 1) % AUTO_PHASES.length;
  }

  const target = AUTO_PHASES[autoPhase];
  const lerp = 0.02;
  state.intensity += (target.int - state.intensity) * lerp;
  state.rhythmicity += (target.rhyt - state.rhythmicity) * lerp;
  state.brightness += (target.brit - state.brightness) * lerp;
  state.stereoWidth += (target.wide - state.stereoWidth) * lerp;
  state.trajectory = target.traj;

  if (target.int > 0.4 && Math.random() < target.rhyt * 0.03) triggerOnset();
  if (target.int > 0.3 && Math.random() < 0.01) triggerMIDI();

  syncSlidersToState();
}

// ═══════════════════════════════════════
//  Readout
// ═══════════════════════════════════════

const readoutEl = document.getElementById('readout');
let avgDensity = 0;

function updateReadout() {
  const dotSize = dotSizeOverride > 0 ? dotSizeOverride :
    Math.max(1, Math.round(CFG.dotSizeMax - (CFG.dotSizeMax - CFG.dotSizeMin) * state.brightness));

  readoutEl.innerHTML =
    `SCENE        <span class="val-highlight">${director.scene}</span>\n` +
    `SCENE TIME   <span class="val-highlight">${director.sceneTime.toFixed(1)}s</span>\n` +
    `NEXT CHECK   <span class="val-highlight">${Math.max(0, director.nextCheckIn).toFixed(1)}s</span>\n` +
    `CHANGE PROB  <span class="val-highlight">${director.changeProb.toFixed(2)}</span>\n` +
    `LAST CHANGE  <span class="val-highlight">${director.lastChangeType}</span>\n` +
    `${'─'.repeat(24)}\n` +
    `FRAMING      <span class="val-highlight">${framing.current}</span>\n` +
    `ZOOM         <span class="val-highlight">${framing.zoom.toFixed(2)}x</span>\n` +
    `${'─'.repeat(24)}\n` +
    `DOT SIZE     <span class="val-highlight">${dotSize}px</span>\n` +
    `DENSITY AVG  <span class="val-highlight">${avgDensity.toFixed(3)}</span>\n` +
    `BANDAS       <span class="val-highlight">${bandas.length}</span>\n` +
    `BLOCCOS      <span class="val-highlight">${bloccos.length}</span>\n` +
    `ONSETS       <span class="val-highlight">${onsetWaves.length}</span>\n` +
    `MIDI COLS    <span class="val-highlight">${midiColumns.length}</span>\n` +
    `CLIMAX       <span style="color:${inClimax ? '#E6007E' : '#2e2e2e'}">${inClimax ? 'ON' : 'OFF'}</span>\n` +
    `INVERTED     <span class="val-highlight">${inverted ? 'YES' : 'NO'}</span>` +
    (autoMode ? `\n${'─'.repeat(24)}\nAUTO         <span class="val-highlight">${AUTO_PHASES[autoPhase].name}</span>` : '');
}

// ═══════════════════════════════════════
//  Slider wiring
// ═══════════════════════════════════════

function wireSlider(id, valId, stateKey, fmt) {
  const sl = document.getElementById(id);
  const vl = document.getElementById(valId);
  sl.addEventListener('input', () => {
    const v = parseFloat(sl.value);
    if (stateKey) state[stateKey] = v;
    vl.textContent = fmt ? fmt(v) : v.toFixed(2);
  });
}

wireSlider('sl-int', 'v-int', 'intensity');
wireSlider('sl-rhyt', 'v-rhyt', 'rhythmicity');
wireSlider('sl-brit', 'v-brit', 'brightness');
wireSlider('sl-wide', 'v-wide', 'stereoWidth');

document.querySelectorAll('.traj-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.traj-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.trajectory = parseInt(btn.dataset.val);
  });
});

// Dot size override
document.getElementById('sl-dot').addEventListener('input', e => {
  const v = parseInt(e.target.value);
  dotSizeOverride = v <= 1 ? 0 : v;
  document.getElementById('v-dot').textContent = v <= 1 ? 'auto' : v + 'px';
});

// Invert
document.getElementById('btn-invert').addEventListener('click', () => {
  inverted = !inverted;
  document.getElementById('btn-invert').textContent = inverted ? 'ON' : 'OFF';
  document.getElementById('btn-invert').classList.toggle('on', inverted);
});

// Director sliders
document.getElementById('sl-base').addEventListener('input', e => {
  dirBaseInterval = parseInt(e.target.value);
  document.getElementById('v-base').textContent = dirBaseInterval + 's';
});
document.getElementById('sl-div').addEventListener('input', e => {
  dirDivisorIdx = parseInt(e.target.value);
  document.getElementById('v-div').textContent = DIVISORS[dirDivisorIdx];
});
document.getElementById('sl-rnd').addEventListener('input', e => {
  dirRandomFactor = parseFloat(e.target.value);
  document.getElementById('v-rnd').textContent = dirRandomFactor.toFixed(2);
});

// Onset + MIDI
document.getElementById('btn-onset').addEventListener('click', triggerOnset);
document.getElementById('btn-midi').addEventListener('click', triggerMIDI);

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); triggerOnset(); }
  if (e.code === 'KeyM') triggerMIDI();
});

// Auto
document.getElementById('btn-auto').addEventListener('click', () => {
  autoMode = !autoMode;
  document.getElementById('btn-auto').classList.toggle('running', autoMode);
  if (autoMode) { autoPhase = 0; autoTimer = 0; }
});

// Presets
const PRESETS = {
  silence:  { intensity: 0,    rhythmicity: 0,    brightness: 0.3, trajectory: 0,  stereoWidth: 0.2 },
  ambient:  { intensity: 0.15, rhythmicity: 0.05, brightness: 0.35, trajectory: 0, stereoWidth: 0.6 },
  building: { intensity: 0.5,  rhythmicity: 0.6,  brightness: 0.5,  trajectory: 1, stereoWidth: 0.4 },
  peak:     { intensity: 0.9,  rhythmicity: 0.85, brightness: 0.8,  trajectory: 0, stereoWidth: 0.3 },
};

function syncSlidersToState() {
  document.getElementById('sl-int').value = state.intensity;
  document.getElementById('v-int').textContent = state.intensity.toFixed(2);
  document.getElementById('sl-rhyt').value = state.rhythmicity;
  document.getElementById('v-rhyt').textContent = state.rhythmicity.toFixed(2);
  document.getElementById('sl-brit').value = state.brightness;
  document.getElementById('v-brit').textContent = state.brightness.toFixed(2);
  document.getElementById('sl-wide').value = state.stereoWidth;
  document.getElementById('v-wide').textContent = state.stereoWidth.toFixed(2);
  document.querySelectorAll('.traj-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.val) === state.trajectory);
  });
}

document.querySelectorAll('.preset').forEach(btn => {
  btn.addEventListener('click', () => {
    const p = PRESETS[btn.dataset.preset];
    if (!p) return;
    Object.assign(state, p);
    syncSlidersToState();
  });
});

// ═══════════════════════════════════════
//  Main loop
// ═══════════════════════════════════════

let lastTime = 0;
let readoutCounter = 0;

initDirector();

function loop(now) {
  requestAnimationFrame(loop);

  const dt = lastTime ? (now - lastTime) / 1000 : 0.016;
  lastTime = now;

  // Update
  globalTime += dt;
  updateAuto(dt);
  updateClimax(dt);
  updateDirector(dt);
  updateFraming();
  updateBandas(dt);
  updateBloccos(dt);
  updateOnsets(dt);
  updateMidi();

  // ── Draw ──
  const bg = inverted ? '#FFFFFF' : '#000000';
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  applyFraming();

  // Effective global dot-size
  const globalDotSize = dotSizeOverride > 0 ? dotSizeOverride :
    Math.max(1, Math.round(CFG.dotSizeMax - (CFG.dotSizeMax - CFG.dotSizeMin) * state.brightness));

  // Render halftone field
  if (globalDotSize >= CFG.dotSizeBufferThreshold) {
    renderFieldFillRect(globalDotSize);
  } else {
    renderFieldBuffer(globalDotSize);
  }

  restoreFraming();

  // Climax overlay (screen space)
  if (inClimax) drawClimax();

  // Sample density for readout (every 30 frames)
  readoutCounter++;
  if (readoutCounter % 30 === 0) {
    let sum = 0, count = 0;
    const step = 80;
    for (let sy = 0; sy < H; sy += step) {
      for (let sx = 0; sx < W; sx += step) {
        sum += computeDensity(sx / W, sy / H, sx, sy);
        count++;
      }
    }
    avgDensity = count > 0 ? sum / count : 0;
  }
  if (readoutCounter % 10 === 0) updateReadout();
}

requestAnimationFrame(loop);
</script>
