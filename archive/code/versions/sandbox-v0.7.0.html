<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MACH:INE II — Sandbox v0.7.0</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #aaa;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      overflow: hidden;
      display: flex;
      height: 100vh;
    }
    #canvas-wrap { flex: 7; position: relative; }
    canvas { display: block; width: 100%; height: 100%; }
    #panel {
      flex: 3; min-width: 280px; max-width: 380px;
      background: #0a0a0a; border-left: 1px solid #1c1c1c;
      padding: 16px; overflow-y: auto; user-select: none;
    }
    .section-title {
      color: #636363; letter-spacing: 0.3em; font-size: 10px;
      margin: 18px 0 8px; border-bottom: 1px solid #1c1c1c; padding-bottom: 4px;
    }
    .section-title:first-child { margin-top: 0; }
    .slider-row { display: flex; align-items: center; margin: 6px 0; gap: 8px; }
    .slider-row label {
      width: 40px; color: #828282; font-size: 10px;
      letter-spacing: 0.15em; flex-shrink: 0;
    }
    .slider-row input[type="range"] {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 3px; background: #2e2e2e; outline: none;
    }
    .slider-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      background: #a8a8a8; border-radius: 0; cursor: pointer;
    }
    .slider-row .val { width: 36px; text-align: right; color: #828282; font-size: 10px; }
    .traj-row { display: flex; align-items: center; margin: 6px 0; gap: 8px; }
    .traj-row label { width: 40px; color: #828282; font-size: 10px; letter-spacing: 0.15em; flex-shrink: 0; }
    .traj-btn {
      flex: 1; background: #1c1c1c; color: #636363; border: 1px solid #2e2e2e;
      font-family: inherit; font-size: 12px; padding: 5px 0; cursor: pointer; text-align: center;
    }
    .traj-btn.active { background: #2e2e2e; color: #e8e8e8; border-color: #636363; }
    .btn-row { display: flex; gap: 6px; margin: 8px 0; }
    .btn {
      flex: 1; background: #1c1c1c; color: #828282; border: 1px solid #2e2e2e;
      font-family: inherit; font-size: 10px; letter-spacing: 0.15em;
      padding: 7px 0; cursor: pointer; text-align: center;
      transition: background 0.15s, color 0.15s;
    }
    .btn:hover { background: #2e2e2e; color: #e8e8e8; }
    .btn.onset { border-color: #FF4400; color: #FF4400; }
    .btn.onset:hover { background: #FF4400; color: #000; }
    .btn.midi-note { border-color: #00AACC; color: #00AACC; }
    .btn.midi-note:hover { background: #00AACC; color: #000; }
    .toggle-row { display: flex; align-items: center; margin: 6px 0; gap: 8px; }
    .toggle-row label { width: 40px; color: #828282; font-size: 10px; letter-spacing: 0.15em; flex-shrink: 0; }
    .toggle-btn {
      background: #1c1c1c; color: #474747; border: 1px solid #2e2e2e;
      font-family: inherit; font-size: 10px; padding: 4px 12px; cursor: pointer;
    }
    .toggle-btn.on { background: #2e2e2e; color: #e8e8e8; border-color: #636363; }
    .preset-row { display: flex; gap: 4px; margin: 8px 0; }
    .preset {
      flex: 1; background: #0d0d0d; color: #636363; border: 1px solid #1c1c1c;
      font-family: inherit; font-size: 9px; letter-spacing: 0.2em;
      padding: 6px 0; cursor: pointer; text-align: center;
    }
    .preset:hover { color: #a8a8a8; border-color: #474747; }
    #readout {
      font-size: 10px; line-height: 1.6; color: #636363;
      white-space: pre; margin-top: 6px;
    }
    #readout .h { color: #a8a8a8; }
    .hint { color: #474747; font-size: 9px; margin-top: 4px; letter-spacing: 0.1em; }
    .btn.auto-btn { border-color: #636363; }
    .btn.auto-btn.running { border-color: #a8a8a8; color: #e8e8e8; background: #2e2e2e; }
    .btn.regen { border-color: #828282; color: #828282; }
    .btn.regen:hover { background: #474747; color: #e8e8e8; }
    .color-toggles { display: flex; gap: 6px; margin: 6px 0; }
    .color-toggle {
      flex: 1; background: #1c1c1c; border: 1px solid #2e2e2e;
      font-family: inherit; font-size: 10px; padding: 4px 0; cursor: pointer; text-align: center;
    }
    .color-toggle.on { border-width: 2px; }
    .color-toggle[data-color="A"] { color: #FF4400; }
    .color-toggle[data-color="A"].on { border-color: #FF4400; background: #1a0800; }
    .color-toggle[data-color="B"] { color: #00AACC; }
    .color-toggle[data-color="B"].on { border-color: #00AACC; background: #001a22; }
    .color-toggle[data-color="C"] { color: #E6007E; }
    .color-toggle[data-color="C"].on { border-color: #E6007E; background: #1a0010; }
    .mut-row { display: flex; gap: 4px; margin: 4px 0; flex-wrap: wrap; }
    .mut-btn {
      flex: 1; min-width: 50px; background: #0d0d0d; color: #474747; border: 1px solid #1c1c1c;
      font-family: inherit; font-size: 8px; letter-spacing: 0.1em;
      padding: 5px 2px; cursor: pointer; text-align: center;
    }
    .mut-btn:hover { color: #a8a8a8; border-color: #474747; }
    #mutation-log {
      font-size: 9px; color: #474747; line-height: 1.5;
      margin-top: 4px; max-height: 60px; overflow: hidden;
    }
    #mutation-log .log-a { color: #FF4400; }
    #mutation-log .log-b { color: #00AACC; }
    #mutation-log .log-c { color: #E6007E; }
    .cam-row { display: flex; gap: 4px; margin: 6px 0; }
    .cam-btn {
      flex: 1; background: #0d0d0d; color: #474747; border: 1px solid #1c1c1c;
      font-family: inherit; font-size: 9px; letter-spacing: 0.15em;
      padding: 5px 0; cursor: pointer; text-align: center;
    }
    .cam-btn:hover { color: #a8a8a8; border-color: #474747; }
    .cam-btn.active { color: #e8e8e8; border-color: #636363; background: #1c1c1c; }
  </style>
</head>
<body>
<div id="canvas-wrap"><canvas id="c"></canvas></div>
<div id="panel">
  <div class="section-title">INPUT</div>
  <div class="slider-row"><label>INT</label><input type="range" id="sl-int" min="0" max="1" step="0.01" value="0"><span class="val" id="v-int">0.00</span></div>
  <div class="slider-row"><label>RHYT</label><input type="range" id="sl-rhyt" min="0" max="1" step="0.01" value="0"><span class="val" id="v-rhyt">0.00</span></div>
  <div class="slider-row"><label>BRIT</label><input type="range" id="sl-brit" min="0" max="1" step="0.01" value="0.5"><span class="val" id="v-brit">0.50</span></div>
  <div class="traj-row"><label>TRAJ</label>
    <button class="traj-btn" data-val="-1">&#9660;</button>
    <button class="traj-btn active" data-val="0">&#9644;</button>
    <button class="traj-btn" data-val="1">&#9650;</button>
  </div>
  <div class="slider-row"><label>WIDE</label><input type="range" id="sl-wide" min="0" max="1" step="0.01" value="0.5"><span class="val" id="v-wide">0.50</span></div>
  <div class="btn-row">
    <button class="btn onset" id="btn-onset">ONSET</button>
    <button class="btn midi-note" id="btn-midi">MIDI NOTE</button>
  </div>
  <div class="hint">SPAZIO = onset &nbsp; M = midi</div>
  <div class="preset-row">
    <button class="preset" data-preset="silence">SILENCE</button>
    <button class="preset" data-preset="ambient">AMBIENT</button>
    <button class="preset" data-preset="building">BUILDING</button>
    <button class="preset" data-preset="peak">PEAK</button>
  </div>
  <div class="btn-row">
    <button class="btn auto-btn" id="btn-auto">AUTO</button>
  </div>

  <div class="section-title">CAMPO</div>
  <div class="slider-row"><label>DOT</label><input type="range" id="sl-dot" min="1" max="16" step="1" value="1"><span class="val" id="v-dot">auto</span></div>
  <div class="slider-row"><label>EVO</label><input type="range" id="sl-evo" min="0.1" max="3" step="0.1" value="1"><span class="val" id="v-evo">1.0</span></div>
  <div class="toggle-row"><label>INV</label><button class="toggle-btn" id="btn-invert">OFF</button></div>
  <div class="btn-row"><button class="btn regen" id="btn-regen">REGEN DNA</button></div>

  <div class="section-title">COLORE</div>
  <div class="color-toggles">
    <button class="color-toggle on" data-color="A">A</button>
    <button class="color-toggle on" data-color="B">B</button>
    <button class="color-toggle on" data-color="C">C</button>
  </div>

  <div class="section-title">MUTAZIONI</div>
  <div class="mut-row">
    <button class="mut-btn" data-mut="PRIMITIVE">PRIM</button>
    <button class="mut-btn" data-mut="INVERT">INV</button>
    <button class="mut-btn" data-mut="RESET_PARTIAL">RESET</button>
    <button class="mut-btn" data-mut="CHROMATIC">CHROM</button>
    <button class="mut-btn" data-mut="SCALE">SCALE</button>
  </div>
  <div id="mutation-log"></div>

  <div class="section-title">CAMERA</div>
  <div class="cam-row">
    <button class="cam-btn active" data-cam="WIDE">WIDE</button>
    <button class="cam-btn" data-cam="MEDIUM">MED</button>
    <button class="cam-btn" data-cam="MACRO">MACRO</button>
    <button class="cam-btn" data-cam="PAN">PAN</button>
  </div>
  <div class="toggle-row"><label>AUTO</label><button class="toggle-btn on" id="btn-autocam">ON</button></div>

  <div class="section-title">REGISTA</div>
  <div id="readout"></div>
  <div class="slider-row"><label>BASE</label><input type="range" id="sl-base" min="10" max="60" step="1" value="30"><span class="val" id="v-base">30s</span></div>
  <div class="slider-row"><label>DIV</label><input type="range" id="sl-div" min="0" max="3" step="1" value="1"><span class="val" id="v-div">8</span></div>
  <div class="slider-row"><label>RND</label><input type="range" id="sl-rnd" min="0" max="1" step="0.01" value="0.3"><span class="val" id="v-rnd">0.30</span></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  MACH:INE II — Sandbox v0.7.0: Il Direttore (Camera 2D)
// ═══════════════════════════════════════════════════════════

const CFG = {
  // Dot-size
  dotSizeMin: 1,
  dotSizeMax: 16,

  // Density
  densityBase: 0.0,
  densityMax: 0.45,
  brightnessDensityBoost: 0.15,
  rhythmFlickerAmp: 0.10,
  rhythmFlickerSpeed: 8,

  // Generations
  maxEntities: 4000,
  birthRateMin: 0,
  birthRateMax: 60,
  onsetBurstCount: 40,
  midiBurstCount: 15,
  entityLifeMin: 4,
  entityLifeMax: 20,
  fossilDuration: 3,
  fossilDensity: 0.03,

  // Ageing dot-size degeneration
  ageDotSizeGrowth: 6,

  // Stereo width
  widthCenterFalloff: 3.0,

  // Onset wave
  onsetWaveSpeed: 800,
  onsetWaveDensity: 0.7,
  onsetWaveWidth: 50,
  onsetDecayRate: 0.92,

  // MIDI column
  midiColumnWidth: 0.03,
  midiColumnDecay: 0.93,

  // Climax
  climaxThresholdSec: 3,
  climaxIntensityThreshold: 0.85,
  climaxShiftSpeed: 0.4,      // how fast entities shift to C per second
  climaxDotCompress: 0.3,     // dot-size multiplier during climax
  climaxDensityBoost: 0.25,
  climaxCollapseSpeed: 3.0,   // how fast entities die after climax ends

  // Color decay
  colorDecayStart: 0.5,       // age fraction where color starts fading
  colorDecayEnd: 0.85,        // age fraction where color is fully grey

  // Camera
  camLerpFast: 0.08,        // lerp when rhythmic (transition ~0.5s)
  camLerpSlow: 0.02,        // lerp when ambient (transition ~2s)
  camMediumZoom: 1.5,
  camMacroZoom: 3,
  camMacroReturnSec: 5,     // MACRO auto-returns after this many seconds
  camPanSpeed: 0.3,
  camPanOscAmp: 0.05,       // vertical sinusoidal oscillation amplitude
  camPanOscSpeed: 0.5,      // oscillation Hz

  // Director
  directorBPM: 120,
  directorPlateauSec: 5,
  directorChangeThreshold: 0.6,

  // Chromatic shift duration
  chromaticShiftDuration: 20,

  // Invert dissolve
  invertDissolveDuration: 1.0,

  // Render
  dotSizeBufferThreshold: 6,
};

// ═══════════════════════════════════════
//  Color constants
// ═══════════════════════════════════════

const COLOR_A = [255, 68, 0];     // #FF4400
const COLOR_B = [0, 170, 204];    // #00AACC
const COLOR_C = [230, 0, 126];    // #E6007E
const COLOR_MAP = { A: COLOR_A, B: COLOR_B, C: COLOR_C };

// ═══════════════════════════════════════
//  Bayer 8x8
// ═══════════════════════════════════════

const BAYER8 = new Float32Array([
   0/64, 32/64,  8/64, 40/64,  2/64, 34/64, 10/64, 42/64,
  48/64, 16/64, 56/64, 24/64, 50/64, 18/64, 58/64, 26/64,
  12/64, 44/64,  4/64, 36/64, 14/64, 46/64,  6/64, 38/64,
  60/64, 28/64, 52/64, 20/64, 62/64, 30/64, 54/64, 22/64,
   3/64, 35/64, 11/64, 43/64,  1/64, 33/64,  9/64, 41/64,
  51/64, 19/64, 59/64, 27/64, 49/64, 17/64, 57/64, 25/64,
  15/64, 47/64,  7/64, 39/64, 13/64, 45/64,  5/64, 37/64,
  63/64, 31/64, 55/64, 23/64, 61/64, 29/64, 53/64, 21/64,
]);

// ═══════════════════════════════════════
//  Canvas
// ═══════════════════════════════════════

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  const wrap = document.getElementById('canvas-wrap');
  W = canvas.width = wrap.clientWidth;
  H = canvas.height = wrap.clientHeight;
}
window.addEventListener('resize', resize);
resize();

// ═══════════════════════════════════════
//  State
// ═══════════════════════════════════════

const state = { intensity: 0, rhythmicity: 0, brightness: 0.5, trajectory: 0, stereoWidth: 0.5 };
let inverted = false;
let dotSizeOverride = 0;
let globalTime = 0;
let evoSpeed = 1;

// Color toggles
const colorEnabled = { A: true, B: true, C: true };

// Chromatic shift state
let chromaticMode = 'normal'; // 'normal', 'all-A', 'all-B', 'grey'
let chromaticTimer = 0;

// Invert dissolve
let invertDissolving = false;
let invertDissolveProgress = 0; // 0-1
let invertTarget = false;

// Climax progress (0 = no climax shift, 1 = full C)
let climaxProgress = 0;

// ═══════════════════════════════════════
//  DNA System
// ═══════════════════════════════════════

const PRIM_TYPES = ['BANDA', 'BLOCCO', 'VETTORE', 'VUOTO', 'FRONTE', 'SCIAME', 'STRISCIA', 'MATRICE'];
const FREQ_MAPPINGS = ['horizontal', 'vertical', 'radial', 'diagonal'];
const ORIENTATIONS = ['horizontal', 'vertical', 'diagonal'];

let dna = null;

function generateDNA() {
  const count = 2 + Math.floor(Math.random() * 2);
  const shuffled = [...PRIM_TYPES].sort(() => Math.random() - 0.5);
  const prims = shuffled.slice(0, count);

  dna = {
    primitives: prims,
    freqMapping: FREQ_MAPPINGS[Math.floor(Math.random() * FREQ_MAPPINGS.length)],
    dotSizeRange: [
      1 + Math.floor(Math.random() * 3),
      10 + Math.floor(Math.random() * 7),
    ],
    evolutionSpeed: 0.4 + Math.random() * 1.2,
    invertProbability: Math.random() * 0.2,

    banda: {
      orientation: ORIENTATIONS[Math.floor(Math.random() * ORIENTATIONS.length)],
      count: 1 + Math.floor(Math.random() * 4),
      widthRange: [0.01 + Math.random() * 0.03, 0.06 + Math.random() * 0.12],
      speed: 0.05 + Math.random() * 0.4,
    },
    blocco: {
      count: 2 + Math.floor(Math.random() * 4),
      sizeRange: [0.03 + Math.random() * 0.05, 0.1 + Math.random() * 0.15],
      dotMul: Math.random() > 0.5 ? 0.3 : 2.5,
    },
    vettore: {
      angle: Math.random() * Math.PI,
      strength: 0.3 + Math.random() * 0.5,
    },
    vuoto: {
      shape: ['rect', 'circle', 'band'][Math.floor(Math.random() * 3)],
      size: 0.1 + Math.random() * 0.25,
      speed: 0.02 + Math.random() * 0.06,
    },
    fronte: {
      orientation: Math.random() > 0.5 ? 'horizontal' : 'vertical',
      speed: 0.05 + Math.random() * 0.15,
    },
    sciame: {
      count: 40 + Math.floor(Math.random() * 80),
      cohesion: 0.3 + Math.random() * 0.6,
      dotSize: [1, 1 + Math.floor(Math.random() * 3)],
    },
    striscia: {
      orientation: ORIENTATIONS[Math.floor(Math.random() * ORIENTATIONS.length)],
      spacing: 4 + Math.floor(Math.random() * 16),
      lineWidth: 1 + Math.floor(Math.random() * 2),
    },
    matrice: {
      cellSize: 10 + Math.floor(Math.random() * 14),
      chars: '▲▼◆○□▸∙:;|!01×÷∞',
    },
  };

  entities = [];
  fossils = [];
  climaxProgress = 0;
  initPrimitiveState();
}

// ═══════════════════════════════════════
//  Primitive state
// ═══════════════════════════════════════

let primState = {};

function initPrimitiveState() {
  primState = {
    bandas: [],
    bloccos: [],
    vuotoPos: { x: 0.3 + Math.random() * 0.4, y: 0.3 + Math.random() * 0.4, vx: 0, vy: 0 },
    frontePos: Math.random(),
    fronteDir: 1,
    sciameCenter: { x: 0.5, y: 0.5, vx: 0, vy: 0 },
    strisciaPhase: 0,
  };

  if (dna.primitives.includes('BANDA')) {
    for (let i = 0; i < dna.banda.count; i++) {
      primState.bandas.push({ position: Math.random(), direction: (Math.random() > 0.5 ? 1 : -1) });
    }
  }
  if (dna.primitives.includes('BLOCCO')) {
    for (let i = 0; i < dna.blocco.count; i++) {
      primState.bloccos.push({
        x: 0.05 + Math.random() * 0.7, y: 0.05 + Math.random() * 0.7,
        w: dna.blocco.sizeRange[0] + Math.random() * (dna.blocco.sizeRange[1] - dna.blocco.sizeRange[0]),
        h: dna.blocco.sizeRange[0] + Math.random() * (dna.blocco.sizeRange[1] - dna.blocco.sizeRange[0]),
        life: 3 + Math.random() * 8, age: Math.random() * 5,
      });
    }
  }
}

// ═══════════════════════════════════════
//  Update primitives
// ═══════════════════════════════════════

function updatePrimitives(dt) {
  const speed = (0.05 + state.rhythmicity * 0.5) * evoSpeed;

  for (const b of primState.bandas) {
    b.position += b.direction * dna.banda.speed * speed * dt;
    if (b.position > 1) { b.position = 1; b.direction = -1; }
    if (b.position < 0) { b.position = 0; b.direction = 1; }
  }

  for (let i = 0; i < primState.bloccos.length; i++) {
    const b = primState.bloccos[i];
    b.age += dt * evoSpeed;
    if (b.age >= b.life) {
      primState.bloccos[i] = {
        x: 0.05 + Math.random() * 0.7, y: 0.05 + Math.random() * 0.7,
        w: dna.blocco.sizeRange[0] + Math.random() * (dna.blocco.sizeRange[1] - dna.blocco.sizeRange[0]),
        h: dna.blocco.sizeRange[0] + Math.random() * (dna.blocco.sizeRange[1] - dna.blocco.sizeRange[0]),
        life: 2 + Math.random() * 6, age: 0,
      };
    }
  }

  const v = primState.vuotoPos;
  v.vx += (Math.random() - 0.5) * 0.01;
  v.vy += (Math.random() - 0.5) * 0.01;
  v.vx *= 0.95; v.vy *= 0.95;
  v.x += v.vx * dna.vuoto.speed * speed;
  v.y += v.vy * dna.vuoto.speed * speed;
  v.x = Math.max(0.1, Math.min(0.9, v.x));
  v.y = Math.max(0.1, Math.min(0.9, v.y));

  const fSpeed = dna.fronte.speed * speed;
  if (state.trajectory === 1) primState.fronteDir = 1;
  else if (state.trajectory === -1) primState.fronteDir = -1;
  primState.frontePos += primState.fronteDir * fSpeed * dt;
  if (primState.frontePos > 1) { primState.frontePos = 1; primState.fronteDir = -1; }
  if (primState.frontePos < 0) { primState.frontePos = 0; primState.fronteDir = 1; }

  const sc = primState.sciameCenter;
  sc.vx += (Math.random() - 0.5) * state.rhythmicity * 0.05;
  sc.vy += (Math.random() - 0.5) * state.rhythmicity * 0.05;
  if (state.trajectory === 1) sc.vy -= 0.005;
  if (state.trajectory === -1) sc.vy += 0.005;
  sc.vx *= 0.96; sc.vy *= 0.96;
  sc.x += sc.vx; sc.y += sc.vy;
  sc.x = Math.max(0.1, Math.min(0.9, sc.x));
  sc.y = Math.max(0.1, Math.min(0.9, sc.y));

  primState.strisciaPhase += state.rhythmicity * speed * dt * 2;
}

// ═══════════════════════════════════════
//  Density from primitives
// ═══════════════════════════════════════

function primitiveDensity(nx, ny) {
  let d = 0;
  if (!dna) return d;
  const prims = dna.primitives;

  if (prims.includes('BANDA')) {
    for (const b of primState.bandas) {
      let coord;
      if (dna.banda.orientation === 'horizontal') coord = ny;
      else if (dna.banda.orientation === 'vertical') coord = nx;
      else coord = (nx + ny) * 0.5;
      const halfW = (dna.banda.widthRange[0] + (dna.banda.widthRange[1] - dna.banda.widthRange[0]) * state.intensity) * 0.5;
      if (Math.abs(coord - b.position) < halfW) {
        d = Math.max(d, 0.7 * state.intensity);
      }
    }
  }

  if (prims.includes('BLOCCO')) {
    for (const b of primState.bloccos) {
      const fadeIn = 0.5, fadeOut = 0.5;
      let alpha;
      if (b.age < fadeIn) alpha = b.age / fadeIn;
      else if (b.age > b.life - fadeOut) alpha = Math.max(0, (b.life - b.age) / fadeOut);
      else alpha = 1;
      if (alpha < 0.05) continue;
      if (nx >= b.x && nx <= b.x + b.w && ny >= b.y && ny <= b.y + b.h) {
        d = Math.max(d, 0.6 * alpha * state.intensity);
      }
    }
  }

  if (prims.includes('VETTORE')) {
    const a = dna.vettore.angle;
    const proj = nx * Math.cos(a) + ny * Math.sin(a);
    const grad = proj * dna.vettore.strength * state.intensity;
    d += grad * 0.5;
  }

  if (prims.includes('VUOTO')) {
    const vp = primState.vuotoPos;
    const vs = dna.vuoto.size;
    let inside = false;
    if (dna.vuoto.shape === 'rect') {
      inside = nx > vp.x - vs && nx < vp.x + vs && ny > vp.y - vs && ny < vp.y + vs;
    } else if (dna.vuoto.shape === 'circle') {
      const dx = nx - vp.x, dy = ny - vp.y;
      inside = Math.sqrt(dx * dx + dy * dy) < vs;
    } else {
      inside = Math.abs(ny - vp.y) < vs * 0.3;
    }
    if (inside) d = -1;
  }

  if (prims.includes('FRONTE')) {
    const coord = dna.fronte.orientation === 'horizontal' ? ny : nx;
    if (coord < primState.frontePos) {
      d += 0.3 * state.intensity;
    } else {
      const dist = coord - primState.frontePos;
      if (dist < 0.05) d += 0.08;
    }
  }

  if (prims.includes('STRISCIA')) {
    let coord;
    if (dna.striscia.orientation === 'horizontal') coord = ny;
    else if (dna.striscia.orientation === 'vertical') coord = nx;
    else coord = (nx + ny) * 0.5;
    const spacing = dna.striscia.spacing / Math.max(W, H);
    const phase = primState.strisciaPhase;
    const modCoord = ((coord + phase * spacing) % spacing) / spacing;
    const lineW = dna.striscia.lineWidth / dna.striscia.spacing;
    const compressionMod = 1 + (state.intensity - 0.5) * 0.6;
    if (modCoord < lineW * compressionMod) {
      d += 0.5 * state.intensity;
    }
  }

  return d;
}

function isInVuoto(nx, ny) {
  if (!dna || !dna.primitives.includes('VUOTO')) return false;
  const vp = primState.vuotoPos;
  const vs = dna.vuoto.size;
  if (dna.vuoto.shape === 'rect') return nx > vp.x - vs && nx < vp.x + vs && ny > vp.y - vs && ny < vp.y + vs;
  if (dna.vuoto.shape === 'circle') { const dx = nx - vp.x, dy = ny - vp.y; return Math.sqrt(dx*dx+dy*dy) < vs; }
  return Math.abs(ny - vp.y) < vs * 0.3;
}

// ═══════════════════════════════════════
//  Entities (generations) — with color
// ═══════════════════════════════════════

let entities = [];
let fossils = [];
let birthAccum = 0;

function birthPosition() {
  let x = Math.random(), y = Math.random();
  if (dna && dna.freqMapping === 'horizontal') {
    x = 0.1 + Math.random() * 0.8;
  } else if (dna && dna.freqMapping === 'radial') {
    const angle = Math.random() * Math.PI * 2;
    const r = 0.1 + Math.random() * 0.35;
    x = 0.5 + Math.cos(angle) * r;
    y = 0.5 + Math.sin(angle) * r;
  }
  if (state.stereoWidth < 1) {
    x = 0.5 + (x - 0.5) * (0.2 + state.stereoWidth * 0.8);
  }
  if (dna && dna.primitives.includes('SCIAME')) {
    const sc = primState.sciameCenter;
    const disp = (1 - dna.sciame.cohesion) * (0.15 + state.stereoWidth * 0.3);
    x = sc.x + (Math.random() - 0.5) * disp;
    y = sc.y + (Math.random() - 0.5) * disp;
  }
  return { x: Math.max(0, Math.min(1, x)), y: Math.max(0, Math.min(1, y)) };
}

function spawnEntity(color) {
  const pos = birthPosition();
  const life = CFG.entityLifeMin + Math.random() * (CFG.entityLifeMax - CFG.entityLifeMin);
  return {
    x: pos.x, y: pos.y,
    density: 0.4 + Math.random() * 0.5,
    age: 0,
    maxAge: life / (dna ? dna.evolutionSpeed : 1),
    dotSizeOffset: 0,
    color: color || null,      // null, 'A', 'B', 'C'
    colorAlpha: color ? 1.0 : 0, // color intensity (fades with age)
  };
}

function updateEntities(dt) {
  const evoDt = dt * evoSpeed * (dna ? dna.evolutionSpeed : 1);

  // Birth
  if (state.intensity > 0.01 && entities.length < CFG.maxEntities) {
    const rate = CFG.birthRateMin + (CFG.birthRateMax - CFG.birthRateMin) * state.intensity;
    birthAccum += rate * dt;
    // Determine color for natural births based on chromatic mode
    let birthColor = null;
    if (chromaticMode === 'all-A' && colorEnabled.A) birthColor = 'A';
    else if (chromaticMode === 'all-B' && colorEnabled.B) birthColor = 'B';
    while (birthAccum >= 1 && entities.length < CFG.maxEntities) {
      entities.push(spawnEntity(birthColor));
      birthAccum -= 1;
    }
  }

  // Climax collapse: if climax just ended, accelerate death
  const postClimax = !inClimax && climaxProgress > 0.1;

  // Update
  for (let i = entities.length - 1; i >= 0; i--) {
    const e = entities[i];

    // Accelerate ageing during post-climax collapse
    if (postClimax) {
      e.age += dt * CFG.climaxCollapseSpeed;
    }

    e.age += evoDt;
    const ageNorm = e.age / e.maxAge;

    if (isInVuoto(e.x, e.y)) {
      e.age = e.maxAge;
    }

    // Lifecycle phases
    if (ageNorm < 0.2) {
      e.dotSizeOffset = 0;
    } else if (ageNorm < 0.6) {
      e.dotSizeOffset = 0;
    } else if (ageNorm < 0.9) {
      const ageFrac = (ageNorm - 0.6) / 0.3;
      e.dotSizeOffset = ageFrac * CFG.ageDotSizeGrowth;
    } else {
      e.dotSizeOffset = CFG.ageDotSizeGrowth;
    }

    // Color decay: fade color toward grey as entity ages
    if (e.color) {
      if (ageNorm < CFG.colorDecayStart) {
        e.colorAlpha = 1.0;
      } else if (ageNorm < CFG.colorDecayEnd) {
        e.colorAlpha = 1.0 - (ageNorm - CFG.colorDecayStart) / (CFG.colorDecayEnd - CFG.colorDecayStart);
      } else {
        e.colorAlpha = 0;
      }
    }

    // Climax: shift entity color toward C
    if (inClimax && colorEnabled.C) {
      if (!e.color) {
        e.color = 'C';
        e.colorAlpha = 0;
      }
      if (e.color !== 'C') {
        // Gradually shift: blend existing color toward C
        e.colorAlpha *= (1 - CFG.climaxShiftSpeed * dt);
        if (e.colorAlpha < 0.1) {
          e.color = 'C';
          e.colorAlpha = 0.1;
        }
      }
      if (e.color === 'C') {
        e.colorAlpha = Math.min(1, e.colorAlpha + CFG.climaxShiftSpeed * dt);
      }
    }

    // Remove dead
    if (ageNorm >= 1) {
      fossils.push({ x: e.x, y: e.y, density: CFG.fossilDensity, life: CFG.fossilDuration, age: 0 });
      entities.splice(i, 1);
    }
  }

  // Update fossils
  for (let i = fossils.length - 1; i >= 0; i--) {
    fossils[i].age += dt;
    if (fossils[i].age >= fossils[i].life) fossils.splice(i, 1);
  }

  // Chromatic timer
  if (chromaticMode !== 'normal') {
    chromaticTimer -= dt;
    if (chromaticTimer <= 0) {
      chromaticMode = 'normal';
      chromaticTimer = 0;
    }
  }
}

function triggerOnset() {
  const color = colorEnabled.A ? 'A' : null;
  for (let i = 0; i < CFG.onsetBurstCount && entities.length < CFG.maxEntities; i++) {
    entities.push(spawnEntity(color));
  }
  // Color contamination: nearby B entities shift toward A
  if (colorEnabled.A) {
    const wave = {
      cx: W * (0.2 + Math.random() * 0.6),
      cy: H * (0.2 + Math.random() * 0.6),
    };
    const waveNx = wave.cx / W, waveNy = wave.cy / H;
    for (const e of entities) {
      if (e.color === 'B') {
        const dx = e.x - waveNx, dy = e.y - waveNy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 0.15) {
          e.color = 'A';
          e.colorAlpha = Math.max(0.3, e.colorAlpha * 0.5);
        }
      }
    }
    onsetWaves.push({ cx: wave.cx, cy: wave.cy, radius: 0, alpha: 1 });
  } else {
    onsetWaves.push({
      cx: W * (0.2 + Math.random() * 0.6),
      cy: H * (0.2 + Math.random() * 0.6),
      radius: 0, alpha: 1,
    });
  }
}

function triggerMIDI() {
  const x = Math.random();
  const color = colorEnabled.B ? 'B' : null;
  for (let i = 0; i < CFG.midiBurstCount && entities.length < CFG.maxEntities; i++) {
    const e = spawnEntity(color);
    e.x = x + (Math.random() - 0.5) * 0.05;
    entities.push(e);
  }
  midiColumns.push({ x: x, alpha: 1 });
}

// ═══════════════════════════════════════
//  Entity density + color grid
// ═══════════════════════════════════════

let entityGrid = null;
let entityColorGrid = null;   // 0=none, 1=A, 2=B, 3=C
let entityColorAlphaGrid = null;
let entityGridCols = 0, entityGridRows = 0;
const ENTITY_GRID_CELL = 32;

const COLOR_ID = { A: 1, B: 2, C: 3 };

function buildEntityGrid() {
  entityGridCols = Math.ceil(W / ENTITY_GRID_CELL);
  entityGridRows = Math.ceil(H / ENTITY_GRID_CELL);
  const cells = entityGridCols * entityGridRows;

  if (!entityGrid || entityGrid.length !== cells) {
    entityGrid = new Float32Array(cells);
    entityColorGrid = new Uint8Array(cells);
    entityColorAlphaGrid = new Float32Array(cells);
  }
  entityGrid.fill(0);
  entityColorGrid.fill(0);
  entityColorAlphaGrid.fill(0);

  // Track youngest entity per cell for color priority
  const youngestAge = new Float32Array(cells);
  youngestAge.fill(999);

  for (const e of entities) {
    const ageNorm = e.age / e.maxAge;
    let eDensity = e.density;

    if (ageNorm < 0.2) {
      eDensity *= ageNorm / 0.2;
    } else if (ageNorm > 0.6) {
      const fadeFrac = (ageNorm - 0.6) / 0.4;
      eDensity *= 1 - fadeFrac * 0.8;
    }

    const col = Math.floor(e.x * W / ENTITY_GRID_CELL);
    const row = Math.floor(e.y * H / ENTITY_GRID_CELL);
    if (col >= 0 && col < entityGridCols && row >= 0 && row < entityGridRows) {
      const idx = row * entityGridCols + col;
      entityGrid[idx] += eDensity;

      // Color: youngest entity wins
      if (e.color && e.colorAlpha > 0.01 && ageNorm < youngestAge[idx]) {
        youngestAge[idx] = ageNorm;
        entityColorGrid[idx] = COLOR_ID[e.color] || 0;
        entityColorAlphaGrid[idx] = e.colorAlpha;
      }
    }
  }

  // Fossils (no color)
  for (const f of fossils) {
    const fadeFrac = f.age / f.life;
    const col = Math.floor(f.x * W / ENTITY_GRID_CELL);
    const row = Math.floor(f.y * H / ENTITY_GRID_CELL);
    if (col >= 0 && col < entityGridCols && row >= 0 && row < entityGridRows) {
      entityGrid[row * entityGridCols + col] += f.density * (1 - fadeFrac);
    }
  }
}

function entityDensityAt(nx, ny) {
  if (!entityGrid) return 0;
  const col = Math.floor(nx * W / ENTITY_GRID_CELL);
  const row = Math.floor(ny * H / ENTITY_GRID_CELL);
  if (col < 0 || col >= entityGridCols || row < 0 || row >= entityGridRows) return 0;
  return Math.min(1, entityGrid[row * entityGridCols + col]);
}

function entityColorAt(nx, ny) {
  if (!entityColorGrid) return [0, 0];
  const col = Math.floor(nx * W / ENTITY_GRID_CELL);
  const row = Math.floor(ny * H / ENTITY_GRID_CELL);
  if (col < 0 || col >= entityGridCols || row < 0 || row >= entityGridRows) return [0, 0];
  const idx = row * entityGridCols + col;
  return [entityColorGrid[idx], entityColorAlphaGrid[idx]];
}

// ═══════════════════════════════════════
//  Onset waves + MIDI columns
// ═══════════════════════════════════════

let onsetWaves = [];
let midiColumns = [];

function updateOnsets(dt) {
  for (let i = onsetWaves.length - 1; i >= 0; i--) {
    const w = onsetWaves[i];
    w.radius += CFG.onsetWaveSpeed * dt;
    w.alpha *= CFG.onsetDecayRate;
    if (w.alpha < 0.01) onsetWaves.splice(i, 1);
  }
}

function updateMidi() {
  for (let i = midiColumns.length - 1; i >= 0; i--) {
    midiColumns[i].alpha *= CFG.midiColumnDecay;
    if (midiColumns[i].alpha < 0.01) midiColumns.splice(i, 1);
  }
}

// ═══════════════════════════════════════
//  Total density at a point
// ═══════════════════════════════════════

function computeDensity(nx, ny, px, py) {
  if (isInVuoto(nx, ny)) return 0;

  const intCurve = state.intensity * state.intensity;
  let d = CFG.densityBase + (CFG.densityMax - CFG.densityBase) * intCurve;

  d += state.brightness * CFG.brightnessDensityBoost;

  if (state.rhythmicity > 0.01) {
    d += Math.sin(globalTime * CFG.rhythmFlickerSpeed * Math.PI * 2) * CFG.rhythmFlickerAmp * state.rhythmicity;
  }

  if (state.stereoWidth < 1) {
    const centerDist = Math.abs(nx - 0.5) * 2;
    d *= 1 - Math.pow(centerDist, CFG.widthCenterFalloff * (1 - state.stereoWidth)) * (1 - state.stereoWidth);
  }

  if (state.trajectory === 1) d += (1 - ny) * 0.15 * state.intensity;
  else if (state.trajectory === -1) d += ny * 0.15 * state.intensity;

  const pd = primitiveDensity(nx, ny);
  if (pd === -1) return 0;
  d += pd;

  d += entityDensityAt(nx, ny);

  for (const w of onsetWaves) {
    const dx = px - w.cx, dy = py - w.cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const ringDist = Math.abs(dist - w.radius);
    if (ringDist < CFG.onsetWaveWidth) {
      d = Math.max(d, (1 - ringDist / CFG.onsetWaveWidth) * CFG.onsetWaveDensity * w.alpha);
    }
  }

  for (const m of midiColumns) {
    const halfW = CFG.midiColumnWidth * 0.5;
    if (Math.abs(nx - m.x) < halfW) {
      d = Math.max(d, (1 - Math.abs(nx - m.x) / halfW) * m.alpha * 0.8);
    }
  }

  // Climax density boost
  if (inClimax) {
    d += CFG.climaxDensityBoost * climaxProgress;
  }

  return Math.max(0, Math.min(1, d));
}

// ═══════════════════════════════════════
//  Color computation for a cell
// ═══════════════════════════════════════

function getCellColor(nx, ny, fgVal) {
  const [colorId, colorAlpha] = entityColorAt(nx, ny);
  if (colorId === 0 || colorAlpha < 0.01) return null;

  let rgb;
  if (colorId === 1) rgb = COLOR_A;
  else if (colorId === 2) rgb = COLOR_B;
  else if (colorId === 3) rgb = COLOR_C;
  else return null;

  // Lerp between fg (white/black) and the color
  const r = Math.round(fgVal + (rgb[0] - fgVal) * colorAlpha);
  const g = Math.round(fgVal + (rgb[1] - fgVal) * colorAlpha);
  const b = Math.round(fgVal + (rgb[2] - fgVal) * colorAlpha);
  return [r, g, b];
}

// ═══════════════════════════════════════
//  MATRICE rendering
// ═══════════════════════════════════════

function drawMatrice() {
  if (!dna || !dna.primitives.includes('MATRICE')) return;

  const cs = dna.matrice.cellSize;
  const cols = Math.ceil(W / cs);
  const rows = Math.ceil(H / cs);
  const chars = dna.matrice.chars;

  ctx.font = `${cs - 2}px 'Courier New', monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  for (let row = 0; row < rows; row++) {
    const ny = row / rows;
    for (let col = 0; col < cols; col++) {
      const nx = col / cols;
      const d = entityDensityAt(nx, ny) + state.intensity * 0.3;
      if (d < 0.15) continue;
      if (Math.random() > d) continue;

      const charIdx = Math.floor((globalTime * state.rhythmicity * 3 + col * 7 + row * 13) % chars.length);
      const alpha = Math.min(1, d) * 0.7;

      // Color
      const fgVal = inverted ? 0 : 255;
      const cellColor = getCellColor(nx, ny, fgVal);
      if (cellColor) {
        ctx.fillStyle = `rgba(${cellColor[0]},${cellColor[1]},${cellColor[2]},${alpha})`;
      } else {
        ctx.fillStyle = inverted ? `rgba(0,0,0,${alpha})` : `rgba(255,255,255,${alpha})`;
      }
      ctx.fillText(chars[charIdx], col * cs + cs / 2, row * cs + cs / 2);
    }
  }
}

// ═══════════════════════════════════════
//  Render field — color-aware
// ═══════════════════════════════════════

function renderFieldFillRect(dotSize) {
  const cols = Math.ceil(W / dotSize);
  const rows = Math.ceil(H / dotSize);
  const fgVal = inverted ? 0 : 255;
  const fgDefault = inverted ? '#000000' : '#FFFFFF';
  let lastFill = '';

  for (let row = 0; row < rows; row++) {
    const py = row * dotSize;
    const ny = py / H;
    for (let col = 0; col < cols; col++) {
      const px = col * dotSize;
      const nx = px / W;

      // Invert dissolve: use Bayer threshold to determine which cells have flipped
      let cellInverted = inverted;
      if (invertDissolving) {
        const bayerVal = BAYER8[(row & 7) * 8 + (col & 7)];
        cellInverted = invertDissolveProgress > bayerVal ? invertTarget : inverted;
      }

      const threshold = BAYER8[(row & 7) * 8 + (col & 7)];
      const density = computeDensity(nx, ny, px, py);
      if (density > threshold) {
        const cellColor = getCellColor(nx, ny, cellInverted ? 0 : 255);
        let fill;
        if (cellColor) {
          fill = `rgb(${cellColor[0]},${cellColor[1]},${cellColor[2]})`;
        } else {
          fill = cellInverted ? '#000000' : '#FFFFFF';
        }
        if (fill !== lastFill) {
          ctx.fillStyle = fill;
          lastFill = fill;
        }
        ctx.fillRect(px, py, dotSize, dotSize);
      }
    }
  }
}

let bufferCanvas = null, bufferCtx = null;

function renderFieldBuffer(dotSize) {
  const bw = Math.ceil(W / dotSize);
  const bh = Math.ceil(H / dotSize);

  if (!bufferCanvas || bufferCanvas.width !== bw || bufferCanvas.height !== bh) {
    bufferCanvas = document.createElement('canvas');
    bufferCanvas.width = bw; bufferCanvas.height = bh;
    bufferCtx = bufferCanvas.getContext('2d');
  }

  const imgData = bufferCtx.createImageData(bw, bh);
  const data = imgData.data;
  const fgVal = inverted ? 0 : 255;

  for (let row = 0; row < bh; row++) {
    const ny = row / bh;
    const py = row * dotSize;
    for (let col = 0; col < bw; col++) {
      const nx = col / bw;
      const px = col * dotSize;

      // Invert dissolve
      let cellFg = fgVal;
      if (invertDissolving) {
        const bayerVal = BAYER8[(row & 7) * 8 + (col & 7)];
        cellFg = invertDissolveProgress > bayerVal ? (invertTarget ? 0 : 255) : fgVal;
      }

      const threshold = BAYER8[(row & 7) * 8 + (col & 7)];
      const density = computeDensity(nx, ny, px, py);
      const idx = (row * bw + col) * 4;
      if (density > threshold) {
        const cellColor = getCellColor(nx, ny, cellFg);
        if (cellColor) {
          data[idx] = cellColor[0]; data[idx+1] = cellColor[1]; data[idx+2] = cellColor[2];
        } else {
          data[idx] = cellFg; data[idx+1] = cellFg; data[idx+2] = cellFg;
        }
        data[idx+3] = 255;
      }
    }
  }

  bufferCtx.putImageData(imgData, 0, 0);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(bufferCanvas, 0, 0, W, H);
  ctx.imageSmoothingEnabled = true;
}

// ═══════════════════════════════════════
//  Climax
// ═══════════════════════════════════════

let climaxTimer = 0, inClimax = false;

function updateClimax(dt) {
  if (state.intensity > CFG.climaxIntensityThreshold) climaxTimer += dt;
  else { climaxTimer = 0; inClimax = false; }
  inClimax = climaxTimer >= CFG.climaxThresholdSec;

  // Climax progress ramp
  if (inClimax && colorEnabled.C) {
    climaxProgress = Math.min(1, climaxProgress + CFG.climaxShiftSpeed * dt);
  } else {
    climaxProgress = Math.max(0, climaxProgress - CFG.climaxShiftSpeed * dt * 0.5);
  }
}

function drawClimaxOverlay() {
  if (climaxProgress < 0.01) return;
  // Subtle C-colored vignette during climax
  const alpha = climaxProgress * 0.08;
  ctx.fillStyle = `rgba(230,0,126,${alpha})`;
  ctx.fillRect(0, 0, W, H);
}

// ═══════════════════════════════════════
//  Camera (Framing)
// ═══════════════════════════════════════

const framing = {
  current: 'WIDE', targetZoom: 1, targetX: 0, targetY: 0,
  zoom: 1, offsetX: 0, offsetY: 0,
  panDirX: 0, panTime: 0,
  macroTimer: 0,
};
const FRAMING_TYPES = ['WIDE', 'MEDIUM', 'MACRO', 'PAN'];
let autoCamera = true;

// Find point of interest: center of mass of entity density
function findPOI() {
  let sumX = 0, sumY = 0, totalD = 0;
  for (const e of entities) {
    const ageNorm = e.age / e.maxAge;
    if (ageNorm > 0.8) continue; // skip dying
    const w = e.density * (1 - ageNorm);
    sumX += e.x * w;
    sumY += e.y * w;
    totalD += w;
  }
  if (totalD < 0.01) return { x: 0.5, y: 0.5 };
  return { x: sumX / totalD, y: sumY / totalD };
}

function setFraming(type) {
  framing.current = type;
  const poi = findPOI();
  framing.macroTimer = 0;

  if (type === 'WIDE') {
    framing.targetZoom = 1;
    framing.targetX = 0;
    framing.targetY = 0;
    framing.panDirX = 0;
  } else if (type === 'MEDIUM') {
    framing.targetZoom = CFG.camMediumZoom;
    // Center on POI
    framing.targetX = (0.5 - poi.x) * W * 0.5;
    framing.targetY = (0.5 - poi.y) * H * 0.5;
    framing.panDirX = 0;
  } else if (type === 'MACRO') {
    framing.targetZoom = CFG.camMacroZoom;
    // Zoom into POI
    framing.targetX = (0.5 - poi.x) * W;
    framing.targetY = (0.5 - poi.y) * H;
    framing.panDirX = 0;
    framing.macroTimer = CFG.camMacroReturnSec;
  } else if (type === 'PAN') {
    framing.targetZoom = 1.2;
    framing.targetX = -W * 0.3;
    framing.targetY = 0;
    framing.panDirX = CFG.camPanSpeed * (0.3 + state.rhythmicity * 0.7);
    framing.panTime = 0;
  }

  updateCamButtons();
}

function updateCamButtons() {
  document.querySelectorAll('.cam-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cam === framing.current);
  });
}

function updateFraming(dt) {
  // Adaptive lerp speed
  const s = state.rhythmicity > 0.5 ? CFG.camLerpFast : CFG.camLerpSlow;

  framing.zoom += (framing.targetZoom - framing.zoom) * s;
  framing.offsetX += (framing.targetX - framing.offsetX) * s;
  framing.offsetY += (framing.targetY - framing.offsetY) * s;

  // PAN drift + vertical oscillation
  if (framing.current === 'PAN') {
    framing.panTime += dt;
    framing.targetX += framing.panDirX;
    if (framing.targetX > W * 0.3 || framing.targetX < -W * 0.3) framing.panDirX *= -1;
    framing.targetY = Math.sin(framing.panTime * CFG.camPanOscSpeed * Math.PI * 2) * H * CFG.camPanOscAmp;
  }

  // MACRO auto-return
  if (framing.current === 'MACRO' && framing.macroTimer > 0) {
    framing.macroTimer -= dt;
    if (framing.macroTimer <= 0) {
      // Return to appropriate shot
      if (autoCamera) {
        pickAutoShot();
      } else {
        setFraming('WIDE');
      }
    }
  }
}

// Auto camera: pick shot based on current state
function pickAutoShot() {
  if (state.intensity < 0.3) {
    setFraming('WIDE');
  } else if (state.rhythmicity > 0.6 && Math.random() < 0.4) {
    setFraming('MACRO');
  } else if (state.trajectory === 0) {
    setFraming('PAN');
  } else {
    setFraming('MEDIUM');
  }
}

// ═══════════════════════════════════════
//  Invert dissolve
// ═══════════════════════════════════════

function startInvertDissolve() {
  invertDissolving = true;
  invertDissolveProgress = 0;
  invertTarget = !inverted;
}

function updateInvertDissolve(dt) {
  if (!invertDissolving) return;
  invertDissolveProgress += dt / CFG.invertDissolveDuration;
  if (invertDissolveProgress >= 1) {
    inverted = invertTarget;
    invertDissolving = false;
    invertDissolveProgress = 0;
    document.getElementById('btn-invert').textContent = inverted ? 'ON' : 'OFF';
    document.getElementById('btn-invert').classList.toggle('on', inverted);
  }
}

// ═══════════════════════════════════════
//  Director — 5 weighted mutations
// ═══════════════════════════════════════

const MUTATION_TYPES = [
  { type: 'PRIMITIVE', weight: 30 },
  { type: 'INVERT', weight: 15 },
  { type: 'RESET_PARTIAL', weight: 15 },
  { type: 'CHROMATIC', weight: 25 },
  { type: 'SCALE', weight: 15 },
];
const MUTATION_TOTAL_WEIGHT = MUTATION_TYPES.reduce((s, m) => s + m.weight, 0);

const director = { sceneTime: 0, nextCheckIn: 0, changeProb: 0, lastChangeType: '——', plateauTime: 0 };
let dirBaseInterval = 30, dirDivisorIdx = 1, dirRandomFactor = 0.3;
const DIVISORS = [4, 8, 16, 32];

// Mutation log
const mutationLog = [];
function logMutation(type, detail) {
  mutationLog.unshift({ type, detail, time: globalTime });
  if (mutationLog.length > 5) mutationLog.pop();
}

function initDirector() { director.sceneTime = 0; computeNextCheck(); }

function computeNextCheck() {
  if (state.rhythmicity > 0.5) {
    director.nextCheckIn = DIVISORS[dirDivisorIdx] * (60 / CFG.directorBPM) * (0.8 + Math.random() * 0.4);
  } else {
    director.nextCheckIn = dirBaseInterval * (1 + dirRandomFactor * Math.random());
  }
}

function updateDirector(dt) {
  director.sceneTime += dt;
  director.nextCheckIn -= dt;
  if (state.trajectory === 0) director.plateauTime += dt; else director.plateauTime = 0;
  if (director.nextCheckIn <= 0) {
    let prob = 0.5;
    if (director.plateauTime > CFG.directorPlateauSec) prob += 0.3;
    prob += dirRandomFactor * Math.random();
    director.changeProb = Math.min(1, prob);
    if (prob > CFG.directorChangeThreshold) {
      // Camera integration: 60% mutation only, 25% mutation+camera, 15% camera only
      const camRoll = Math.random();
      if (camRoll < 0.60) {
        executeMutation();
      } else if (camRoll < 0.85) {
        executeMutation();
        if (autoCamera) pickAutoShot();
      } else {
        if (autoCamera) pickAutoShot();
        logMutation('CAMERA', framing.current);
      }
    }
    computeNextCheck();
  }
}

function pickMutationType() {
  let r = Math.random() * MUTATION_TOTAL_WEIGHT;
  for (const m of MUTATION_TYPES) {
    r -= m.weight;
    if (r <= 0) return m.type;
  }
  return 'PRIMITIVE';
}

function executeMutation(forceType) {
  const type = forceType || pickMutationType();
  director.lastChangeType = type;
  director.sceneTime = 0;

  if (type === 'PRIMITIVE') {
    if (dna && dna.primitives.length > 0) {
      const idx = Math.floor(Math.random() * dna.primitives.length);
      const old = dna.primitives[idx];
      const available = PRIM_TYPES.filter(p => !dna.primitives.includes(p));
      if (available.length > 0) {
        const newPrim = available[Math.floor(Math.random() * available.length)];
        dna.primitives[idx] = newPrim;
        initPrimitiveState();
        logMutation(type, `${old}→${newPrim}`);
      }
    }
  } else if (type === 'INVERT') {
    startInvertDissolve();
    logMutation(type, invertTarget ? 'W→B' : 'B→W');
  } else if (type === 'RESET_PARTIAL') {
    // Kill entities in a random rectangular zone
    const rx = Math.random() * 0.6 + 0.1;
    const ry = Math.random() * 0.6 + 0.1;
    const rw = 0.1 + Math.random() * 0.3;
    const rh = 0.1 + Math.random() * 0.3;
    let killed = 0;
    for (const e of entities) {
      if (e.x > rx && e.x < rx + rw && e.y > ry && e.y < ry + rh) {
        e.age = e.maxAge; // force death
        killed++;
      }
    }
    logMutation(type, `${killed} killed`);
  } else if (type === 'CHROMATIC') {
    const modes = ['all-A', 'all-B', 'grey'];
    chromaticMode = modes[Math.floor(Math.random() * modes.length)];
    chromaticTimer = CFG.chromaticShiftDuration;
    logMutation(type, chromaticMode);
  } else if (type === 'SCALE') {
    if (dna) {
      const oldRange = dna.dotSizeRange.join('-');
      // Shift toward fine or coarse
      if (Math.random() > 0.5) {
        dna.dotSizeRange = [1, 2 + Math.floor(Math.random() * 4)]; // fine
      } else {
        dna.dotSizeRange = [6 + Math.floor(Math.random() * 4), 12 + Math.floor(Math.random() * 5)]; // coarse
      }
      logMutation(type, `${oldRange}→${dna.dotSizeRange.join('-')}`);
    }
  }
}

// ═══════════════════════════════════════
//  Auto mode
// ═══════════════════════════════════════

let autoMode = false, autoPhase = 0, autoTimer = 0;
const AUTO_PHASES = [
  { name: 'SILENCE',  dur: 4,  int: 0,    rhyt: 0,    brit: 0.3,  traj: 0,  wide: 0.2 },
  { name: 'AMBIENT',  dur: 8,  int: 0.15, rhyt: 0.05, brit: 0.35, traj: 0,  wide: 0.6 },
  { name: 'BUILDING', dur: 6,  int: 0.45, rhyt: 0.5,  brit: 0.5,  traj: 1,  wide: 0.4 },
  { name: 'PEAK',     dur: 5,  int: 0.85, rhyt: 0.8,  brit: 0.7,  traj: 0,  wide: 0.3 },
  { name: 'CLIMAX',   dur: 5,  int: 0.95, rhyt: 0.9,  brit: 0.85, traj: 0,  wide: 0.2 },
  { name: 'DECAY',    dur: 6,  int: 0.2,  rhyt: 0.1,  brit: 0.4,  traj: -1, wide: 0.5 },
];

function updateAuto(dt) {
  if (!autoMode) return;
  autoTimer += dt;
  if (autoTimer >= AUTO_PHASES[autoPhase].dur) {
    autoTimer = 0;
    autoPhase = (autoPhase + 1) % AUTO_PHASES.length;
  }
  const target = AUTO_PHASES[autoPhase];
  state.intensity += (target.int - state.intensity) * 0.02;
  state.rhythmicity += (target.rhyt - state.rhythmicity) * 0.02;
  state.brightness += (target.brit - state.brightness) * 0.02;
  state.stereoWidth += (target.wide - state.stereoWidth) * 0.02;
  state.trajectory = target.traj;
  if (target.int > 0.4 && Math.random() < target.rhyt * 0.03) triggerOnset();
  if (target.int > 0.3 && Math.random() < 0.01) triggerMIDI();
  syncSlidersToState();
}

// ═══════════════════════════════════════
//  Readout
// ═══════════════════════════════════════

const readoutEl = document.getElementById('readout');

function updateReadout() {
  const dotSize = dotSizeOverride > 0 ? dotSizeOverride :
    Math.max(1, Math.round(CFG.dotSizeMax - (CFG.dotSizeMax - CFG.dotSizeMin) * state.brightness));

  const primList = dna ? dna.primitives.join('+') : '——';
  const mapping = dna ? dna.freqMapping : '——';

  let avgAge = 0, countA = 0, countB = 0, countC = 0;
  for (const e of entities) {
    const norm = e.age / e.maxAge;
    avgAge += norm;
    if (e.color === 'A' && e.colorAlpha > 0.1) countA++;
    if (e.color === 'B' && e.colorAlpha > 0.1) countB++;
    if (e.color === 'C' && e.colorAlpha > 0.1) countC++;
  }
  if (entities.length > 0) avgAge /= entities.length;

  readoutEl.innerHTML =
    `DNA          <span class="h">${primList}</span>\n` +
    `MAPPING      <span class="h">${mapping}</span>\n` +
    `DOT RANGE    <span class="h">${dna ? dna.dotSizeRange.join('-') : '——'}px</span>\n` +
    `EVO SPEED    <span class="h">${(dna ? dna.evolutionSpeed : 0).toFixed(2)}</span>\n` +
    `${'─'.repeat(24)}\n` +
    `ENTITIES     <span class="h">${entities.length}</span>\n` +
    `FOSSILS      <span class="h">${fossils.length}</span>\n` +
    `AVG AGE      <span class="h">${avgAge.toFixed(2)}</span>\n` +
    `BIRTH RATE   <span class="h">${(CFG.birthRateMax * state.intensity).toFixed(0)}/s</span>\n` +
    `${'─'.repeat(24)}\n` +
    `<span style="color:#FF4400">A</span> ${countA}  <span style="color:#00AACC">B</span> ${countB}  <span style="color:#E6007E">C</span> ${countC}\n` +
    `CHROMATIC    <span class="h">${chromaticMode}${chromaticTimer > 0 ? ' ' + chromaticTimer.toFixed(0) + 's' : ''}</span>\n` +
    `${'─'.repeat(24)}\n` +
    `SCENE TIME   <span class="h">${director.sceneTime.toFixed(1)}s</span>\n` +
    `NEXT CHECK   <span class="h">${Math.max(0, director.nextCheckIn).toFixed(1)}s</span>\n` +
    `LAST CHANGE  <span class="h">${director.lastChangeType}</span>\n` +
    `CAMERA       <span class="h">${framing.current}</span> ×${framing.zoom.toFixed(1)}\n` +
    `CAM OFFSET   <span class="h">${framing.offsetX.toFixed(0)},${framing.offsetY.toFixed(0)}</span>\n` +
    (framing.macroTimer > 0 ? `MACRO RTN    <span class="h">${framing.macroTimer.toFixed(1)}s</span>\n` : '') +
    `DOT SIZE     <span class="h">${dotSize}px</span>\n` +
    `CLIMAX       <span style="color:${climaxProgress > 0.1 ? '#E6007E' : '#2e2e2e'}">${climaxProgress > 0.1 ? (climaxProgress * 100).toFixed(0) + '%' : 'OFF'}</span>` +
    (autoMode ? `\nAUTO         <span class="h">${AUTO_PHASES[autoPhase].name}</span>` : '');
}

function updateMutationLogUI() {
  const el = document.getElementById('mutation-log');
  el.innerHTML = mutationLog.map(m => {
    const ago = (globalTime - m.time).toFixed(0);
    const cls = m.type === 'CHROMATIC' ? (m.detail.includes('A') ? 'log-a' : m.detail.includes('B') ? 'log-b' : '') : '';
    return `<span class="${cls}">${m.type}</span> ${m.detail} <span style="color:#2e2e2e">${ago}s</span>`;
  }).join('\n');
}

// ═══════════════════════════════════════
//  Wiring
// ═══════════════════════════════════════

function wireSlider(id, valId, stateKey, fmt) {
  const sl = document.getElementById(id), vl = document.getElementById(valId);
  sl.addEventListener('input', () => {
    const v = parseFloat(sl.value);
    if (stateKey) state[stateKey] = v;
    vl.textContent = fmt ? fmt(v) : v.toFixed(2);
  });
}
wireSlider('sl-int', 'v-int', 'intensity');
wireSlider('sl-rhyt', 'v-rhyt', 'rhythmicity');
wireSlider('sl-brit', 'v-brit', 'brightness');
wireSlider('sl-wide', 'v-wide', 'stereoWidth');

document.querySelectorAll('.traj-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.traj-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.trajectory = parseInt(btn.dataset.val);
  });
});

document.getElementById('sl-dot').addEventListener('input', e => {
  const v = parseInt(e.target.value);
  dotSizeOverride = v <= 1 ? 0 : v;
  document.getElementById('v-dot').textContent = v <= 1 ? 'auto' : v + 'px';
});

document.getElementById('sl-evo').addEventListener('input', e => {
  evoSpeed = parseFloat(e.target.value);
  document.getElementById('v-evo').textContent = evoSpeed.toFixed(1);
});

document.getElementById('btn-invert').addEventListener('click', () => {
  startInvertDissolve();
});

document.getElementById('btn-regen').addEventListener('click', () => { generateDNA(); });

document.getElementById('sl-base').addEventListener('input', e => {
  dirBaseInterval = parseInt(e.target.value);
  document.getElementById('v-base').textContent = dirBaseInterval + 's';
});
document.getElementById('sl-div').addEventListener('input', e => {
  dirDivisorIdx = parseInt(e.target.value);
  document.getElementById('v-div').textContent = DIVISORS[dirDivisorIdx];
});
document.getElementById('sl-rnd').addEventListener('input', e => {
  dirRandomFactor = parseFloat(e.target.value);
  document.getElementById('v-rnd').textContent = dirRandomFactor.toFixed(2);
});

document.getElementById('btn-onset').addEventListener('click', triggerOnset);
document.getElementById('btn-midi').addEventListener('click', triggerMIDI);
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); triggerOnset(); }
  if (e.code === 'KeyM') triggerMIDI();
});

document.getElementById('btn-auto').addEventListener('click', () => {
  autoMode = !autoMode;
  document.getElementById('btn-auto').classList.toggle('running', autoMode);
  if (autoMode) { autoPhase = 0; autoTimer = 0; }
});

// Color toggles
document.querySelectorAll('.color-toggle').forEach(btn => {
  btn.addEventListener('click', () => {
    const c = btn.dataset.color;
    colorEnabled[c] = !colorEnabled[c];
    btn.classList.toggle('on', colorEnabled[c]);
  });
});

// Mutation buttons
document.querySelectorAll('.mut-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    executeMutation(btn.dataset.mut);
  });
});

// Camera buttons
document.querySelectorAll('.cam-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    autoCamera = false;
    document.getElementById('btn-autocam').textContent = 'OFF';
    document.getElementById('btn-autocam').classList.remove('on');
    setFraming(btn.dataset.cam);
  });
});

document.getElementById('btn-autocam').addEventListener('click', () => {
  autoCamera = !autoCamera;
  document.getElementById('btn-autocam').textContent = autoCamera ? 'ON' : 'OFF';
  document.getElementById('btn-autocam').classList.toggle('on', autoCamera);
});

const PRESETS = {
  silence:  { intensity: 0,    rhythmicity: 0,    brightness: 0.3,  trajectory: 0,  stereoWidth: 0.2 },
  ambient:  { intensity: 0.15, rhythmicity: 0.05, brightness: 0.35, trajectory: 0,  stereoWidth: 0.6 },
  building: { intensity: 0.5,  rhythmicity: 0.6,  brightness: 0.5,  trajectory: 1,  stereoWidth: 0.4 },
  peak:     { intensity: 0.9,  rhythmicity: 0.85, brightness: 0.8,  trajectory: 0,  stereoWidth: 0.3 },
};

function syncSlidersToState() {
  document.getElementById('sl-int').value = state.intensity;
  document.getElementById('v-int').textContent = state.intensity.toFixed(2);
  document.getElementById('sl-rhyt').value = state.rhythmicity;
  document.getElementById('v-rhyt').textContent = state.rhythmicity.toFixed(2);
  document.getElementById('sl-brit').value = state.brightness;
  document.getElementById('v-brit').textContent = state.brightness.toFixed(2);
  document.getElementById('sl-wide').value = state.stereoWidth;
  document.getElementById('v-wide').textContent = state.stereoWidth.toFixed(2);
  document.querySelectorAll('.traj-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.val) === state.trajectory));
}

document.querySelectorAll('.preset').forEach(btn => {
  btn.addEventListener('click', () => {
    const p = PRESETS[btn.dataset.preset];
    if (!p) return;
    Object.assign(state, p);
    syncSlidersToState();
  });
});

// ═══════════════════════════════════════
//  Main loop
// ═══════════════════════════════════════

let lastTime = 0, frameCount = 0;

generateDNA();
initDirector();

function loop(now) {
  requestAnimationFrame(loop);
  const dt = lastTime ? Math.min((now - lastTime) / 1000, 0.05) : 0.016;
  lastTime = now;
  globalTime += dt;

  updateAuto(dt);
  updateClimax(dt);
  updateDirector(dt);
  updateFraming(dt);
  updateInvertDissolve(dt);
  updatePrimitives(dt);
  updateEntities(dt);
  updateOnsets(dt);
  updateMidi();

  buildEntityGrid();

  // Background
  const bgInverted = invertDissolving ? inverted : inverted; // during dissolve, keep original bg
  ctx.fillStyle = inverted ? '#FFFFFF' : '#000000';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.scale(framing.zoom, framing.zoom);
  ctx.translate(-W/2 + framing.offsetX, -H/2 + framing.offsetY);

  // Dot size with climax compression
  let globalDotSize = dotSizeOverride > 0 ? dotSizeOverride :
    Math.max(1, Math.round(CFG.dotSizeMax - (CFG.dotSizeMax - CFG.dotSizeMin) * state.brightness));

  if (climaxProgress > 0.1) {
    const compress = 1 - (1 - CFG.climaxDotCompress) * climaxProgress;
    globalDotSize = Math.max(1, Math.round(globalDotSize * compress));
  }

  if (globalDotSize >= CFG.dotSizeBufferThreshold) {
    renderFieldFillRect(globalDotSize);
  } else {
    renderFieldBuffer(globalDotSize);
  }

  drawMatrice();
  ctx.restore();

  drawClimaxOverlay();

  frameCount++;
  if (frameCount % 10 === 0) {
    updateReadout();
    updateMutationLogUI();
  }
}

requestAnimationFrame(loop);
</script>
