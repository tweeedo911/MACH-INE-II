<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MACH:INE II — Sandbox Narrativo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #aaa;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      overflow: hidden;
      display: flex;
      height: 100vh;
    }

    /* ── Canvas area ── */
    #canvas-wrap {
      flex: 7;
      position: relative;
    }
    canvas { display: block; width: 100%; height: 100%; }

    /* ── Control panel ── */
    #panel {
      flex: 3;
      min-width: 300px;
      max-width: 400px;
      background: #0d0d0d;
      border-left: 1px solid #2e2e2e;
      padding: 20px;
      overflow-y: auto;
      user-select: none;
    }

    .section-title {
      color: #a8a8a8;
      letter-spacing: 0.3em;
      font-size: 11px;
      margin: 24px 0 12px;
      border-bottom: 1px solid #2e2e2e;
      padding-bottom: 6px;
    }
    .section-title:first-child { margin-top: 0; }

    /* ── Sliders ── */
    .slider-row {
      display: flex;
      align-items: center;
      margin: 8px 0;
      gap: 10px;
    }
    .slider-row label {
      width: 40px;
      color: #cecece;
      font-size: 11px;
      letter-spacing: 0.15em;
      flex-shrink: 0;
    }
    .slider-row input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: #2e2e2e;
      outline: none;
    }
    .slider-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      background: #e8e8e8;
      border-radius: 0;
      cursor: pointer;
    }
    .slider-row .val {
      width: 40px;
      text-align: right;
      color: #a8a8a8;
      font-size: 11px;
    }

    /* ── Trajectory buttons ── */
    .traj-row {
      display: flex;
      align-items: center;
      margin: 8px 0;
      gap: 10px;
    }
    .traj-row label {
      width: 40px;
      color: #cecece;
      font-size: 11px;
      letter-spacing: 0.15em;
      flex-shrink: 0;
    }
    .traj-btn {
      flex: 1;
      background: #1c1c1c;
      color: #828282;
      border: 1px solid #2e2e2e;
      font-family: inherit;
      font-size: 14px;
      padding: 6px 0;
      cursor: pointer;
      text-align: center;
    }
    .traj-btn.active {
      background: #2e2e2e;
      color: #fff;
      border-color: #828282;
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 6px;
      margin: 8px 0;
    }
    .btn {
      flex: 1;
      background: #1c1c1c;
      color: #a8a8a8;
      border: 1px solid #474747;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.15em;
      padding: 10px 0;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, color 0.15s;
    }
    .btn:hover { background: #2e2e2e; color: #fff; }
    .btn.onset { border-color: #FF4400; color: #FF4400; }
    .btn.onset:hover { background: #FF4400; color: #000; }
    .btn.midi-note { border-color: #00AACC; color: #00AACC; }
    .btn.midi-note:hover { background: #00AACC; color: #000; }
    .btn.auto-mode { border-color: #E6007E; color: #E6007E; }
    .btn.auto-mode:hover { background: #E6007E; color: #000; }
    .btn.auto-mode.active { background: #E6007E; color: #000; }

    /* ── Presets ── */
    .preset-row { display: flex; gap: 6px; margin: 10px 0; }
    .preset {
      flex: 1;
      background: #0d0d0d;
      color: #828282;
      border: 1px solid #2e2e2e;
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 0.2em;
      padding: 8px 0;
      cursor: pointer;
      text-align: center;
    }
    .preset:hover { color: #e8e8e8; border-color: #636363; }

    /* ── Readout ── */
    #readout {
      font-size: 11px;
      line-height: 1.8;
      color: #828282;
      white-space: pre;
      margin-top: 10px;
    }
    #readout .val-highlight { color: #e8e8e8; }

    /* ── Keyboard hints ── */
    .hint {
      color: #474747;
      font-size: 9px;
      margin-top: 6px;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
</div>

<div id="panel">
  <div class="section-title">SIMULAZIONE INPUT</div>

  <div class="slider-row">
    <label>INT</label>
    <input type="range" id="sl-int" min="0" max="1" step="0.01" value="0">
    <span class="val" id="v-int">0.00</span>
  </div>
  <div class="slider-row">
    <label>RHYT</label>
    <input type="range" id="sl-rhyt" min="0" max="1" step="0.01" value="0">
    <span class="val" id="v-rhyt">0.00</span>
  </div>
  <div class="slider-row">
    <label>BRIT</label>
    <input type="range" id="sl-brit" min="0" max="1" step="0.01" value="0">
    <span class="val" id="v-brit">0.00</span>
  </div>

  <div class="traj-row">
    <label>TRAJ</label>
    <button class="traj-btn" data-val="-1">&#9660;</button>
    <button class="traj-btn active" data-val="0">&#9644;</button>
    <button class="traj-btn" data-val="1">&#9650;</button>
  </div>

  <div class="slider-row">
    <label>WIDE</label>
    <input type="range" id="sl-wide" min="0" max="1" step="0.01" value="0">
    <span class="val" id="v-wide">0.00</span>
  </div>

  <div class="btn-row">
    <button class="btn onset" id="btn-onset">ONSET</button>
    <button class="btn midi-note" id="btn-midi">MIDI NOTE</button>
  </div>
  <div class="btn-row">
    <button class="btn auto-mode" id="btn-auto">AUTO</button>
  </div>
  <div class="hint">SPAZIO = onset &nbsp; M = midi &nbsp; A = auto</div>

  <div class="preset-row">
    <button class="preset" data-preset="ambient">AMBIENT</button>
    <button class="preset" data-preset="building">BUILDING</button>
    <button class="preset" data-preset="peak">PEAK</button>
  </div>

  <div class="section-title">REGISTA</div>
  <div id="readout"></div>

  <div class="slider-row">
    <label>BASE</label>
    <input type="range" id="sl-base" min="10" max="60" step="1" value="30">
    <span class="val" id="v-base">30s</span>
  </div>
  <div class="slider-row">
    <label>DIV</label>
    <input type="range" id="sl-div" min="0" max="3" step="1" value="1">
    <span class="val" id="v-div">8</span>
  </div>
  <div class="slider-row">
    <label>RND</label>
    <input type="range" id="sl-rnd" min="0" max="1" step="0.01" value="0.3">
    <span class="val" id="v-rnd">0.30</span>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  MACH:INE II — Sandbox Narrativo
//  Self-contained: logica regista, scena, simulazione input
// ═══════════════════════════════════════════════════════════

// ── CONFIG ──
const CFG = {
  // Particles
  particleMin: 30,
  particleMax: 400,
  particleBaseSpeed: 0.4,       // px/frame at rhythmicity 0
  particleRhythmSpeed: 3.0,     // additional px/frame at rhythmicity 1
  particleBrownianAmp: 0.8,     // brownian motion amplitude
  particleSpawnRate: 5,         // particles spawned per frame when needed
  particleMaxAge: 300,          // frames before particle fades
  particleFadeFrames: 30,       // frames to fade in/out

  // Onset flash
  onsetDecay: 0.88,
  onsetRectCount: 5,

  // MIDI flash
  midiFlashDecay: 0.91,

  // Dither
  ditherAlphaMax: 0.08,         // max dither overlay alpha (at brightness 0)

  // Climax
  climaxThresholdSec: 3,        // seconds of intensity > 0.85 before climax
  climaxIntensityThreshold: 0.85,
  climaxPulseSpeed: 0.03,

  // Director / Regista
  directorBPM: 120,             // simulated BPM for rhythmic timing
  directorPlateauSec: 5,        // seconds of stable trajectory before bonus
  directorChangeThreshold: 0.6, // probability threshold for scene change

  // Framing
  framingTransitionSpeed: 0.02, // lerp speed per frame
  framingMacroZoom: 3,
  framingMediumZoom: 1.5,
  framingPanSpeed: 0.3,         // px/frame
};

// ═══════════════════════════════════════
//  Canvas setup
// ═══════════════════════════════════════

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  const wrap = document.getElementById('canvas-wrap');
  W = canvas.width = wrap.clientWidth;
  H = canvas.height = wrap.clientHeight;
}
window.addEventListener('resize', resize);
resize();

// ═══════════════════════════════════════
//  State (driven by sliders)
// ═══════════════════════════════════════

const state = {
  intensity: 0,
  rhythmicity: 0,
  brightness: 0,
  trajectory: 0,
  stereoWidth: 0,
};

// ═══════════════════════════════════════
//  Bayer 8x8 dither matrix
// ═══════════════════════════════════════

const BAYER8 = [
   0,32, 8,40, 2,34,10,42,
  48,16,56,24,50,18,58,26,
  12,44, 4,36,14,46, 6,38,
  60,28,52,20,62,30,54,22,
   3,35,11,43, 1,33, 9,41,
  51,19,59,27,49,17,57,25,
  15,47, 7,39,13,45, 5,37,
  63,31,55,23,61,29,53,21,
];

let ditherImageData = null;

function createDitherPattern() {
  // Create an 8x8 ImageData for the dither tile
  ditherImageData = ctx.createImageData(8, 8);
  for (let i = 0; i < 64; i++) {
    const threshold = BAYER8[i] / 64;
    const a = threshold < 0.5 ? 255 : 0;
    ditherImageData.data[i * 4 + 0] = 255;
    ditherImageData.data[i * 4 + 1] = 255;
    ditherImageData.data[i * 4 + 2] = 255;
    ditherImageData.data[i * 4 + 3] = a;
  }
}
createDitherPattern();

// ═══════════════════════════════════════
//  Particle system
// ═══════════════════════════════════════

let particles = [];

function spawnParticle() {
  const spreadX = 0.1 + state.stereoWidth * 0.9; // 0.1 (centered) to 1.0 (full width)
  const centerX = W / 2;
  const rangeX = W * spreadX;

  return {
    x: centerX + (Math.random() - 0.5) * rangeX,
    y: Math.random() * H,
    vx: 0,
    vy: 0,
    age: 0,
    maxAge: CFG.particleMaxAge * (0.5 + Math.random() * 0.5),
    size: 1 + Math.random() * 2,
  };
}

function updateParticles() {
  const targetCount = Math.floor(CFG.particleMin + (CFG.particleMax - CFG.particleMin) * state.intensity);

  // Spawn if needed
  if (particles.length < targetCount) {
    const toSpawn = Math.min(CFG.particleSpawnRate, targetCount - particles.length);
    for (let i = 0; i < toSpawn; i++) {
      particles.push(spawnParticle());
    }
  }

  const speed = CFG.particleBaseSpeed + state.rhythmicity * CFG.particleRhythmSpeed;

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.age++;

    // Trajectory-driven motion
    if (state.trajectory === 1) {
      p.vy -= speed * 0.05;
    } else if (state.trajectory === -1) {
      p.vy += speed * 0.05;
    }

    // Brownian motion
    p.vx += (Math.random() - 0.5) * CFG.particleBrownianAmp * speed;
    p.vy += (Math.random() - 0.5) * CFG.particleBrownianAmp * speed;

    // Damping
    p.vx *= 0.92;
    p.vy *= 0.92;

    p.x += p.vx;
    p.y += p.vy;

    // Wrap around
    if (p.x < 0) p.x += W;
    if (p.x > W) p.x -= W;
    if (p.y < 0) p.y += H;
    if (p.y > H) p.y -= H;

    // Remove old particles
    if (p.age > p.maxAge) {
      particles.splice(i, 1);
      continue;
    }

    // Remove excess
    if (particles.length > targetCount + 10 && p.age > p.maxAge * 0.7) {
      particles.splice(i, 1);
    }
  }
}

function drawParticles() {
  const baseLum = Math.floor(80 + state.brightness * 175); // 80-255

  for (const p of particles) {
    // Fade in/out
    let alpha = 1;
    if (p.age < CFG.particleFadeFrames) {
      alpha = p.age / CFG.particleFadeFrames;
    } else if (p.age > p.maxAge - CFG.particleFadeFrames) {
      alpha = (p.maxAge - p.age) / CFG.particleFadeFrames;
    }
    alpha = Math.max(0, Math.min(1, alpha));

    const lum = Math.floor(baseLum * (0.6 + Math.random() * 0.4));
    ctx.fillStyle = `rgba(${lum},${lum},${lum},${alpha})`;
    ctx.fillRect(Math.floor(p.x), Math.floor(p.y), p.size, p.size);
  }
}

// ═══════════════════════════════════════
//  Onset flash (Color A: #FF4400)
// ═══════════════════════════════════════

let onsetAlpha = 0;

function triggerOnset() {
  onsetAlpha = 1;
}

function drawOnsetFlash() {
  if (onsetAlpha < 0.01) return;

  const cx = W / 2, cy = H / 2;
  ctx.lineWidth = 1;

  for (let i = 0; i < CFG.onsetRectCount; i++) {
    const frac = (i / CFG.onsetRectCount) + (1 - onsetAlpha) * 0.5;
    const s = frac * Math.min(W, H) * 0.6;
    const a = onsetAlpha * (1 - i * 0.18);
    if (a < 0.01) continue;
    ctx.strokeStyle = `rgba(255,68,0,${a})`;
    ctx.strokeRect(cx - s, cy - s * (H / W), s * 2, s * 2 * (H / W));
  }

  // Center cross
  const cs = onsetAlpha * 14;
  ctx.strokeStyle = `rgba(255,68,0,${onsetAlpha * 0.9})`;
  ctx.beginPath();
  ctx.moveTo(cx - cs, cy); ctx.lineTo(cx + cs, cy);
  ctx.moveTo(cx, cy - cs); ctx.lineTo(cx, cy + cs);
  ctx.stroke();

  onsetAlpha *= CFG.onsetDecay;
}

// ═══════════════════════════════════════
//  MIDI note flash (Color B: #00AACC)
// ═══════════════════════════════════════

let midiFlashes = [];

function triggerMIDI() {
  midiFlashes.push({
    x: Math.random() * W,
    alpha: 0.6 + Math.random() * 0.4,
  });
}

function drawMIDIFlashes() {
  for (let i = midiFlashes.length - 1; i >= 0; i--) {
    const f = midiFlashes[i];
    f.alpha *= CFG.midiFlashDecay;
    if (f.alpha < 0.008) { midiFlashes.splice(i, 1); continue; }

    // Vertical line
    ctx.strokeStyle = `rgba(0,170,204,${f.alpha * 0.5})`;
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.moveTo(f.x, 0);
    ctx.lineTo(f.x, H);
    ctx.stroke();

    // Small square
    const s = f.alpha * 16;
    ctx.strokeStyle = `rgba(0,170,204,${f.alpha})`;
    ctx.lineWidth = 0.8;
    ctx.strokeRect(f.x - s, H * 0.5 - s, s * 2, s * 2);

    // Tiny square at top
    const ts = f.alpha * 4;
    ctx.strokeRect(f.x - ts, 20 - ts, ts * 2, ts * 2);
  }
}

// ═══════════════════════════════════════
//  Dither overlay
// ═══════════════════════════════════════

function drawDither() {
  const ditherStrength = (1 - state.brightness) * CFG.ditherAlphaMax;
  if (ditherStrength < 0.002) return;

  ctx.globalAlpha = ditherStrength;
  // Tile the 8x8 pattern across the canvas
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = 8;
  tempCanvas.height = 8;
  const tCtx = tempCanvas.getContext('2d');
  tCtx.putImageData(ditherImageData, 0, 0);

  const pat = ctx.createPattern(tempCanvas, 'repeat');
  ctx.fillStyle = pat;
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════
//  Climax (Color C: #E6007E)
// ═══════════════════════════════════════

let climaxTimer = 0;    // seconds above threshold
let inClimax = false;
let climaxPhase = 0;

function updateClimax(dt) {
  if (state.intensity > CFG.climaxIntensityThreshold) {
    climaxTimer += dt;
  } else {
    climaxTimer = 0;
    inClimax = false;
  }
  inClimax = climaxTimer >= CFG.climaxThresholdSec;
}

function drawClimax() {
  if (!inClimax) return;

  climaxPhase += CFG.climaxPulseSpeed;
  const pulse = 0.3 + Math.sin(climaxPhase) * 0.2;

  // Flood overlay
  ctx.fillStyle = `rgba(230,0,126,${pulse * 0.15})`;
  ctx.fillRect(0, 0, W, H);

  // Concentric rectangles
  const cx = W / 2, cy = H / 2;
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 8; i++) {
    const t = (i / 8 + climaxPhase * 0.5) % 1;
    const s = t * Math.max(W, H) * 0.7;
    const a = (1 - t) * 0.6;
    ctx.strokeStyle = `rgba(230,0,126,${a})`;
    ctx.strokeRect(cx - s, cy - s * (H / W), s * 2, s * 2 * (H / W));
  }
}

// ═══════════════════════════════════════
//  Framing (viewport transform)
// ═══════════════════════════════════════

const framing = {
  current: 'WIDE',
  targetZoom: 1,
  targetX: 0,
  targetY: 0,
  zoom: 1,
  offsetX: 0,
  offsetY: 0,
  panDirX: 0,
};

const FRAMING_TYPES = ['WIDE', 'MEDIUM', 'MACRO', 'PAN'];

function setFraming(type) {
  framing.current = type;
  switch (type) {
    case 'WIDE':
      framing.targetZoom = 1;
      framing.targetX = 0;
      framing.targetY = 0;
      framing.panDirX = 0;
      break;
    case 'MEDIUM':
      framing.targetZoom = CFG.framingMediumZoom;
      framing.targetX = 0;
      framing.targetY = 0;
      framing.panDirX = 0;
      break;
    case 'MACRO':
      framing.targetZoom = CFG.framingMacroZoom;
      framing.targetX = (Math.random() - 0.5) * W * 0.4;
      framing.targetY = (Math.random() - 0.5) * H * 0.4;
      framing.panDirX = 0;
      break;
    case 'PAN':
      framing.targetZoom = 1.2;
      framing.targetX = -W * 0.3;
      framing.targetY = 0;
      framing.panDirX = CFG.framingPanSpeed;
      break;
  }
}

function updateFraming() {
  const s = CFG.framingTransitionSpeed;
  framing.zoom += (framing.targetZoom - framing.zoom) * s;
  framing.offsetX += (framing.targetX - framing.offsetX) * s;
  framing.offsetY += (framing.targetY - framing.offsetY) * s;

  // PAN continuous motion
  if (framing.current === 'PAN') {
    framing.targetX += framing.panDirX;
    if (framing.targetX > W * 0.3 || framing.targetX < -W * 0.3) {
      framing.panDirX *= -1;
    }
  }
}

function applyFraming() {
  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.scale(framing.zoom, framing.zoom);
  ctx.translate(-W / 2 + framing.offsetX, -H / 2 + framing.offsetY);
}

function restoreFraming() {
  ctx.restore();
}

// ═══════════════════════════════════════
//  Director / Regista
// ═══════════════════════════════════════

const SCENE_TYPES = ['CAMPO_PUNTI']; // v0.3.0: una sola scena
const CHANGE_TYPES = ['TEXTURE', 'FRAMING', 'COLOR', 'RESET'];

const director = {
  scene: 'CAMPO_PUNTI',
  sceneTime: 0,          // seconds in current scene
  nextCheckIn: 0,        // seconds until next check
  changeProb: 0,
  lastChangeType: '——',
  colorA: true,
  colorB: false,
  colorC: false,
  plateauTime: 0,        // seconds of trajectory == 0
};

// Director config from sliders
let dirBaseInterval = 30;
let dirDivisorIdx = 1;   // index: 0=4, 1=8, 2=16, 3=32
let dirRandomFactor = 0.3;

const DIVISORS = [4, 8, 16, 32];

function initDirector() {
  director.sceneTime = 0;
  computeNextCheck();
}

function computeNextCheck() {
  if (state.rhythmicity > 0.5) {
    // Rhythmic: beat-based
    const beatSec = 60 / CFG.directorBPM;
    const beats = DIVISORS[dirDivisorIdx];
    director.nextCheckIn = beats * beatSec * (0.8 + Math.random() * 0.4);
  } else {
    // Non-rhythmic: time-based
    director.nextCheckIn = dirBaseInterval * (1 + dirRandomFactor * Math.random());
  }
}

function updateDirector(dt) {
  director.sceneTime += dt;
  director.nextCheckIn -= dt;

  // Track plateau
  if (state.trajectory === 0) {
    director.plateauTime += dt;
  } else {
    director.plateauTime = 0;
  }

  if (director.nextCheckIn <= 0) {
    // Roll the dice
    let prob = 0.5;
    if (director.plateauTime > CFG.directorPlateauSec) {
      prob += 0.3;
    }
    prob += dirRandomFactor * Math.random();
    director.changeProb = Math.min(1, prob);

    if (prob > CFG.directorChangeThreshold) {
      executeChange();
    }

    computeNextCheck();
  }
}

function executeChange() {
  const type = CHANGE_TYPES[Math.floor(Math.random() * CHANGE_TYPES.length)];
  director.lastChangeType = type;
  director.sceneTime = 0;

  switch (type) {
    case 'TEXTURE':
      // In v0.3.0 only one scene, so just reset particles
      particles = [];
      break;
    case 'FRAMING':
      const newFraming = FRAMING_TYPES[Math.floor(Math.random() * FRAMING_TYPES.length)];
      setFraming(newFraming);
      break;
    case 'COLOR':
      // Toggle A/B (C is climax-only)
      if (Math.random() > 0.5) {
        director.colorA = !director.colorA;
      } else {
        director.colorB = !director.colorB;
      }
      break;
    case 'RESET':
      particles = [];
      setFraming('WIDE');
      director.colorA = true;
      director.colorB = false;
      break;
  }
}

// ═══════════════════════════════════════
//  Readout panel
// ═══════════════════════════════════════

const readoutEl = document.getElementById('readout');

function updateReadout() {
  readoutEl.innerHTML =
    `SCENE        <span class="val-highlight">${director.scene}</span>\n` +
    `SCENE TIME   <span class="val-highlight">${director.sceneTime.toFixed(1)}s</span>\n` +
    `NEXT CHECK   <span class="val-highlight">${Math.max(0, director.nextCheckIn).toFixed(1)}s</span>\n` +
    `CHANGE PROB  <span class="val-highlight">${director.changeProb.toFixed(2)}</span>\n` +
    `LAST CHANGE  <span class="val-highlight">${director.lastChangeType}</span>\n` +
    `${'─'.repeat(22)}\n` +
    `FRAMING      <span class="val-highlight">${framing.current}</span>\n` +
    `COLOR A      <span style="color:${director.colorA ? '#FF4400' : '#2e2e2e'}">${director.colorA ? 'ON' : 'OFF'}</span>\n` +
    `COLOR B      <span style="color:${director.colorB ? '#00AACC' : '#2e2e2e'}">${director.colorB ? 'ON' : 'OFF'}</span>\n` +
    `COLOR C      <span style="color:${inClimax ? '#E6007E' : '#2e2e2e'}">${inClimax ? 'ON' : 'OFF'}</span>`;
}

// ═══════════════════════════════════════
//  Slider / button wiring
// ═══════════════════════════════════════

function wireSlider(id, valId, stateKey, fmt) {
  const sl = document.getElementById(id);
  const vl = document.getElementById(valId);
  sl.addEventListener('input', () => {
    const v = parseFloat(sl.value);
    if (stateKey) state[stateKey] = v;
    vl.textContent = fmt ? fmt(v) : v.toFixed(2);
  });
}

wireSlider('sl-int', 'v-int', 'intensity');
wireSlider('sl-rhyt', 'v-rhyt', 'rhythmicity');
wireSlider('sl-brit', 'v-brit', 'brightness');
wireSlider('sl-wide', 'v-wide', 'stereoWidth');

// Trajectory buttons
document.querySelectorAll('.traj-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.traj-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.trajectory = parseInt(btn.dataset.val);
  });
});

// Director sliders
document.getElementById('sl-base').addEventListener('input', e => {
  dirBaseInterval = parseInt(e.target.value);
  document.getElementById('v-base').textContent = dirBaseInterval + 's';
});
document.getElementById('sl-div').addEventListener('input', e => {
  dirDivisorIdx = parseInt(e.target.value);
  document.getElementById('v-div').textContent = DIVISORS[dirDivisorIdx];
});
document.getElementById('sl-rnd').addEventListener('input', e => {
  dirRandomFactor = parseFloat(e.target.value);
  document.getElementById('v-rnd').textContent = dirRandomFactor.toFixed(2);
});

// Onset + MIDI buttons
document.getElementById('btn-onset').addEventListener('click', triggerOnset);
document.getElementById('btn-midi').addEventListener('click', triggerMIDI);

// Keyboard
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); triggerOnset(); }
  if (e.code === 'KeyM') { triggerMIDI(); }
  if (e.code === 'KeyA') { toggleAuto(); }
});

// Presets
const PRESETS = {
  ambient:  { intensity: 0.1, rhythmicity: 0.05, brightness: 0.3, trajectory: 0, stereoWidth: 0.6 },
  building: { intensity: 0.5, rhythmicity: 0.6,  brightness: 0.5, trajectory: 1, stereoWidth: 0.4 },
  peak:     { intensity: 0.9, rhythmicity: 0.85, brightness: 0.8, trajectory: 0, stereoWidth: 0.3 },
};

document.querySelectorAll('.preset').forEach(btn => {
  btn.addEventListener('click', () => {
    const p = PRESETS[btn.dataset.preset];
    if (!p) return;

    state.intensity = p.intensity;
    state.rhythmicity = p.rhythmicity;
    state.brightness = p.brightness;
    state.trajectory = p.trajectory;
    state.stereoWidth = p.stereoWidth;

    // Sync sliders
    document.getElementById('sl-int').value = p.intensity;
    document.getElementById('v-int').textContent = p.intensity.toFixed(2);
    document.getElementById('sl-rhyt').value = p.rhythmicity;
    document.getElementById('v-rhyt').textContent = p.rhythmicity.toFixed(2);
    document.getElementById('sl-brit').value = p.brightness;
    document.getElementById('v-brit').textContent = p.brightness.toFixed(2);
    document.getElementById('sl-wide').value = p.stereoWidth;
    document.getElementById('v-wide').textContent = p.stereoWidth.toFixed(2);

    // Trajectory buttons
    document.querySelectorAll('.traj-btn').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.val) === p.trajectory);
    });
  });
});

// ═══════════════════════════════════════
//  AUTO mode
// ═══════════════════════════════════════

let autoMode = false;
let autoTime = 0;
let autoPhase = 0; // 0=ambient, 1=building, 2=peak, 3=drop

const AUTO_PHASES = [
  { name: 'ambient',  dur: 8,  target: { intensity: 0.1,  rhythmicity: 0.05, brightness: 0.3, trajectory: 0,  stereoWidth: 0.6 }, onsetRate: 0.3, midiRate: 0.1 },
  { name: 'building', dur: 10, target: { intensity: 0.5,  rhythmicity: 0.6,  brightness: 0.5, trajectory: 1,  stereoWidth: 0.4 }, onsetRate: 2,   midiRate: 1.5 },
  { name: 'peak',     dur: 8,  target: { intensity: 0.92, rhythmicity: 0.85, brightness: 0.8, trajectory: 0,  stereoWidth: 0.3 }, onsetRate: 5,   midiRate: 3   },
  { name: 'drop',     dur: 6,  target: { intensity: 0.05, rhythmicity: 0.1,  brightness: 0.15, trajectory: -1, stereoWidth: 0.7 }, onsetRate: 0.1, midiRate: 0   },
];

function toggleAuto() {
  autoMode = !autoMode;
  document.getElementById('btn-auto').classList.toggle('active', autoMode);
  if (autoMode) {
    autoTime = 0;
    autoPhase = 0;
  }
}

function updateAuto(dt) {
  if (!autoMode) return;

  autoTime += dt;
  const phase = AUTO_PHASES[autoPhase];

  // Smooth lerp toward target values
  const lerpSpeed = 0.02;
  for (const key of Object.keys(phase.target)) {
    if (key === 'trajectory') {
      state[key] = phase.target[key];
    } else {
      state[key] += (phase.target[key] - state[key]) * lerpSpeed;
    }
  }

  // Sync sliders with auto state
  syncSlidersFromState();

  // Random onset/midi triggers
  if (Math.random() < phase.onsetRate * dt) triggerOnset();
  if (Math.random() < phase.midiRate * dt) triggerMIDI();

  // Advance phase
  if (autoTime > phase.dur) {
    autoTime = 0;
    autoPhase = (autoPhase + 1) % AUTO_PHASES.length;
  }
}

function syncSlidersFromState() {
  document.getElementById('sl-int').value = state.intensity;
  document.getElementById('v-int').textContent = state.intensity.toFixed(2);
  document.getElementById('sl-rhyt').value = state.rhythmicity;
  document.getElementById('v-rhyt').textContent = state.rhythmicity.toFixed(2);
  document.getElementById('sl-brit').value = state.brightness;
  document.getElementById('v-brit').textContent = state.brightness.toFixed(2);
  document.getElementById('sl-wide').value = state.stereoWidth;
  document.getElementById('v-wide').textContent = state.stereoWidth.toFixed(2);
  document.querySelectorAll('.traj-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.val) === state.trajectory);
  });
}

document.getElementById('btn-auto').addEventListener('click', toggleAuto);

// ═══════════════════════════════════════
//  Main loop
// ═══════════════════════════════════════

let lastTime = 0;
let readoutCounter = 0;

initDirector();

function loop(now) {
  requestAnimationFrame(loop);

  const dt = lastTime ? (now - lastTime) / 1000 : 0.016;
  lastTime = now;

  // Update systems
  updateAuto(dt);
  updateClimax(dt);
  updateDirector(dt);
  updateFraming();
  updateParticles();

  // ── Draw ──
  // Background
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Apply framing transform
  applyFraming();

  // Particles
  drawParticles();

  // Onset flash (only if color A is on or always for direct trigger)
  drawOnsetFlash();

  // MIDI flashes (only if color B is on or always for direct trigger)
  drawMIDIFlashes();

  // Climax
  if (inClimax) drawClimax();

  restoreFraming();

  // Dither overlay (on top, outside framing)
  drawDither();

  // Readout (every ~10 frames)
  readoutCounter++;
  if (readoutCounter % 10 === 0) updateReadout();
}

requestAnimationFrame(loop);
</script>
