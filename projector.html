<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>MACH:INE III — PROJECTOR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #000; overflow: hidden; width: 100%; height: 100%; }
    canvas { display: block; cursor: none; }
    #fs-hint {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #000; cursor: pointer; z-index: 10;
    }
    #fs-hint span {
      font-family: 'Courier New', monospace;
      font-size: 10px; letter-spacing: 0.4em;
      color: rgba(255,255,255,0.2);
      transition: color 0.3s;
    }
    #fs-hint:hover span { color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="fs-hint"><span>CLICK FOR FULLSCREEN</span></div>
<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.imageSmoothingEnabled = false; // reset after resize (browser clears state)
  }
  resize();
  window.addEventListener('resize', resize);

  // Signal main window that projector is ready
  const ch = new BroadcastChannel('machine-projector');
  ch.postMessage({ type: 'ready' });

  // Close when main window closes or sends close signal
  ch.onmessage = (e) => { if (e.data.type === 'close') window.close(); };
  window.addEventListener('beforeunload', () => ch.postMessage({ type: 'projector-closed' }));

  // Enter native fullscreen on first click (removes address bar completely)
  const hint = document.getElementById('fs-hint');
  function goFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().then(() => {
        hint.style.display = 'none';
      }).catch(() => { hint.style.display = 'none'; });
    }
  }
  hint.addEventListener('click', goFullscreen);
  // Also listen for 'F' key to toggle fullscreen manually
  document.addEventListener('keydown', (e) => {
    if (e.code === 'KeyF') {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
      else document.exitFullscreen();
    }
    // ESC is handled natively by the browser to exit fullscreen
  });

  // Draw loop — pulls directly from main canvas (same-origin, zero-copy)
  function draw() {
    if (!window.opener || window.opener.closed) { window.close(); return; }
    const src = window.opener.document.getElementById('c');
    if (src) ctx.drawImage(src, 0, 0, canvas.width, canvas.height);
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
</script>
</body>
</html>
